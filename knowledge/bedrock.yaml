# Falsify knowledge seed — BEDROCK tier
# ----------------------------------------------------------------------------
# Established scientific laws and observed / natural regularities.
# Highest weight in the rules engine. Cannot be overridden by a lower tier.
#
# THIS FILE IS THE SOURCE OF TRUTH (version-controlled). It is mirrored into
# OpenBrain for semantic recall by the seed-sync step — never hand-edited there.
#
# STARTER SET: curated and intentionally small. Expand via pull request so the
# git history becomes an audit trail of what we admit as "bedrock" and why.
# Honesty rule: where a "law" is really a domain-limited approximation, say so
# in `domain_of_validity`. We do not inflate certainty.
# ----------------------------------------------------------------------------
tier: bedrock
weight: 1.0
entries:
  - id: bedrock.energy.conservation
    statement: >-
      Energy is neither created nor destroyed in an isolated system; total
      energy stays constant over time.
    domain: physics/thermodynamics
    type: law
    falsifiable: true
    falsified_if: >-
      A reproducible isolated system gains or loses total energy with no
      external exchange.
    status: unrefuted
    confidence: high
    domain_of_validity: >-
      Stated for laboratory and engineering regimes. "Total energy" is subtle
      at cosmological scale in general relativity.
    sources: ["First law of thermodynamics", "Noether's theorem (time symmetry)"]

  - id: bedrock.thermo.entropy
    statement: >-
      The total entropy of an isolated system never decreases; it tends toward
      a maximum.
    domain: physics/thermodynamics
    type: law
    falsifiable: true
    falsified_if: >-
      A reproducible isolated system is observed to spontaneously decrease its
      total entropy without external work.
    status: unrefuted
    confidence: high
    sources: ["Second law of thermodynamics", "Clausius 1865", "Boltzmann"]

  - id: bedrock.momentum.conservation
    statement: >-
      The total linear momentum of a closed system is constant absent external
      forces.
    domain: physics/mechanics
    type: law
    falsifiable: true
    falsified_if: >-
      A closed system changes total momentum with no external force acting.
    status: unrefuted
    confidence: high
    sources: ["Newton's laws", "Noether's theorem (spatial translation symmetry)"]

  - id: bedrock.charge.conservation
    statement: >-
      Electric charge is conserved; the net charge of an isolated system does
      not change.
    domain: physics/electromagnetism
    type: law
    falsifiable: true
    falsified_if: >-
      Net charge of an isolated system is observed to change in a reproducible
      experiment.
    status: unrefuted
    confidence: high
    sources: ["Maxwell's equations (continuity equation)"]

  - id: bedrock.lightspeed.invariance
    statement: >-
      The speed of light in vacuum is the same for all inertial observers,
      independent of the motion of source or observer.
    domain: physics/relativity
    type: observed-constant
    falsifiable: true
    falsified_if: >-
      A reproducible measurement finds the vacuum speed of light differing
      between inertial frames.
    status: unrefuted
    confidence: high
    sources: ["Michelson-Morley 1887", "foundation of special relativity"]

  - id: bedrock.chem.definite_proportions
    statement: >-
      A given chemical compound always contains its constituent elements in a
      fixed mass ratio.
    domain: chemistry
    type: law
    falsifiable: true
    falsified_if: >-
      A pure compound is shown to form in continuously variable element mass
      ratios.
    status: unrefuted
    confidence: high
    domain_of_validity: >-
      Holds for stoichiometric compounds; non-stoichiometric (berthollide)
      solids are a known, bounded exception.
    sources: ["Proust's law of definite proportions"]

  - id: bedrock.angular_momentum.conservation
    statement: >-
      The total angular momentum of a closed system is constant absent an
      external torque.
    domain: physics/mechanics
    type: law
    falsifiable: true
    falsified_if: >-
      A closed system changes total angular momentum with no external torque
      acting.
    status: unrefuted
    confidence: high
    sources: ["Newtonian mechanics", "Noether's theorem (rotational symmetry)"]

  - id: bedrock.mass.conservation
    statement: >-
      Matter is neither created nor destroyed in an ordinary chemical reaction;
      the total mass of reactants equals the total mass of products.
    domain: chemistry
    type: law
    falsifiable: true
    falsified_if: >-
      A reproducible closed-system chemical reaction is shown to change total
      mass with no matter entering or leaving.
    status: unrefuted
    confidence: high
    domain_of_validity: >-
      Holds for chemical reactions. In nuclear reactions and at relativistic
      energies, mass and energy interconvert (E=mc^2) and only total
      mass-energy is conserved.
    sources: ["Lavoisier (conservation of mass)"]

  - id: bedrock.equivalence.principle
    statement: >-
      Inertial mass (resistance to acceleration) and gravitational mass (the
      source of weight) are equal, so all bodies fall with the same acceleration
      in a given gravitational field regardless of composition.
    domain: physics/gravitation
    type: observed-regularity
    falsifiable: true
    falsified_if: >-
      A reproducible test finds bodies of different composition falling with
      different accelerations in the same field (a non-zero Eotvos ratio beyond
      experimental bounds).
    status: unrefuted
    confidence: high
    domain_of_validity: >-
      The empirical bedrock under gravity. Its elevation to a geometric
      principle is general relativity (see established.yaml).
    sources: ["Eotvos experiments", "Lunar laser ranging", "MICROSCOPE 2017"]

  - id: bedrock.quantum.pauli_exclusion
    statement: >-
      No two identical fermions (e.g. electrons) can occupy the same quantum
      state simultaneously.
    domain: physics/quantum
    type: principle
    falsifiable: true
    falsified_if: >-
      A reproducible observation of two identical fermions sharing all quantum
      numbers in the same system.
    status: unrefuted
    confidence: high
    domain_of_validity: >-
      Applies to fermions (half-integer spin); bosons are explicitly exempt and
      can share states.
    sources: ["Pauli 1925", "structure of the periodic table", "electron-degeneracy pressure"]

  - id: bedrock.quantum.uncertainty
    statement: >-
      Certain pairs of properties (e.g. position and momentum) cannot both be
      known to arbitrary precision; the product of their uncertainties has a
      nonzero lower bound.
    domain: physics/quantum
    type: principle
    falsifiable: true
    falsified_if: >-
      A reproducible measurement determines a conjugate pair more precisely than
      the bound h-bar/2 permits.
    status: unrefuted
    confidence: high
    sources: ["Heisenberg 1927", "Fourier-conjugate structure of quantum states"]

  - id: bedrock.thermo.zeroth_law
    statement: >-
      If two systems are each in thermal equilibrium with a third, they are in
      thermal equilibrium with each other — which is what makes temperature a
      well-defined quantity.
    domain: physics/thermodynamics
    type: law
    falsifiable: true
    falsified_if: >-
      A reproducible violation of the transitivity of thermal equilibrium.
    status: unrefuted
    confidence: high
    sources: ["Zeroth law of thermodynamics"]

  - id: bedrock.dna.base_pairing
    statement: >-
      In double-stranded DNA, adenine pairs specifically with thymine and
      guanine with cytosine, so across the genome the amount of A equals T and
      G equals C (Chargaff's rules), and the two strands are complementary.
    domain: biology/molecular
    type: observed-regularity
    falsifiable: true
    falsified_if: >-
      Reproducible sequencing of canonical double-stranded DNA showing
      systematic non-complementary pairing, or A != T / G != C beyond sampling
      error in a complete genome.
    status: unrefuted
    confidence: high
    domain_of_validity: >-
      Stated for canonical Watson-Crick double-stranded DNA. Non-canonical
      pairings (wobble in RNA, Hoogsteen, mismatches) are known, bounded
      exceptions in specific contexts.
    sources: ["Chargaff 1950", "Watson & Crick 1953"]

  - id: bedrock.chem.periodic_law
    statement: >-
      When the elements are ordered by atomic number, their chemical and
      physical properties recur at periodic intervals.
    domain: chemistry
    type: law
    falsifiable: true
    falsified_if: >-
      A reproducible discovery of an element whose properties break the periodic
      recurrence predicted by its atomic number, with no nuclear or relativistic
      explanation.
    status: unrefuted
    confidence: high
    domain_of_validity: >-
      The empirical regularity. Its explanation in terms of electron shell
      structure is quantum mechanics (see established.yaml). Relativistic effects
      perturb the heaviest elements in known, bounded ways.
    sources: ["Mendeleev 1869", "Moseley 1913 (ordering by atomic number)"]

  - id: bedrock.geology.superposition
    statement: >-
      In an undisturbed sequence of sedimentary rock layers, each layer is
      younger than the one beneath it and older than the one above it.
    domain: geology/stratigraphy
    type: observed-regularity
    falsifiable: true
    falsified_if: >-
      A reproducibly undisturbed sedimentary sequence is shown to deposit younger
      layers beneath older ones.
    status: unrefuted
    confidence: high
    domain_of_validity: >-
      Stated for undisturbed deposition. Tectonic folding, overthrusts, and
      intrusions can invert or interleave layers — these are detectable
      disturbances, not exceptions to the rule.
    sources: ["Steno 1669 (law of superposition)"]

  - id: bedrock.physics.landauer
    statement: >-
      Erasing one bit of information in a computation has a minimum thermodynamic
      cost: it must dissipate at least kT ln 2 of energy as heat.
    domain: physics/computation
    type: principle
    falsifiable: true
    falsified_if: >-
      A reproducible logically irreversible bit erasure is measured to dissipate
      less than kT ln 2 of heat to its environment.
    status: unrefuted
    confidence: high
    domain_of_validity: >-
      Sets a lower bound on logically irreversible computation; logically
      reversible operations are not subject to it. Confirmed in single-bit
      experiments (2012 onward) approaching the bound.
    sources: ["Landauer 1961", "Berut et al. 2012 (experimental confirmation)"]

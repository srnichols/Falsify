# Falsify knowledge seed — QUANTITATIVE tier
# ----------------------------------------------------------------------------
# Math, statistics, and probability. NOT a shelf of "facts" — these are a
# CROSS-CUTTING LENS the engine applies to every claim from every other tier
# before reporting it. They are unbiased tools; the failure mode they guard
# against is people ignoring them to drive a narrative.
#
# Each entry is a principle the engine must check against when evaluating a
# claim's evidence. `triggers` hint when the principle is most relevant.
#
# SOURCE OF TRUTH (version-controlled). Mirrored into OpenBrain by seed-sync.
# STARTER SET: expand via pull request.
# ----------------------------------------------------------------------------
tier: quantitative
weight: cross-cutting   # applied to every tier; not ranked against them
entries:
  - id: quant.bayes
    principle: "Bayesian updating"
    statement: >-
      A claim's credibility must combine the evidence with the prior
      probability, not the evidence alone.
    formula: "P(H|E) = P(E|H) * P(H) / P(E)"
    triggers: ["strong claim from weak prior", "surprising result", "rare event"]
    failure_guarded: "ignoring how unlikely the hypothesis was to begin with"

  - id: quant.base_rate
    principle: "Base-rate neglect"
    statement: >-
      For a rare condition, even an accurate test produces mostly false
      positives; the base rate dominates the posterior.
    triggers: ["diagnostic test", "screening", "rare event detection"]
    failure_guarded: "quoting test accuracy while ignoring prevalence"

  - id: quant.correlation_causation
    principle: "Correlation is not causation"
    statement: >-
      An association does not establish that one variable causes the other;
      confounders or reverse causation must be ruled out.
    triggers: ["observational study", "X linked to Y", "trend comparison"]
    failure_guarded: "inferring a causal mechanism from a correlation alone"

  - id: quant.significance
    principle: "Statistical significance is not effect size or truth"
    statement: >-
      A small p-value does not mean a large, important, or real effect; it is
      sensitive to sample size and to multiple comparisons.
    triggers: ["p-value cited", "'significant' result", "many outcomes tested"]
    failure_guarded: "p-hacking, treating p<0.05 as proof"

  - id: quant.regression_mean
    principle: "Regression to the mean"
    statement: >-
      Extreme measurements tend to be followed by less extreme ones, which can
      masquerade as a treatment effect.
    triggers: ["before/after on extreme group", "intervention after a bad spell"]
    failure_guarded: "crediting an intervention for natural reversion"

  - id: quant.large_numbers
    principle: "Law of large numbers / sample size"
    statement: >-
      Small samples are noisy; apparent effects in small samples often vanish
      at scale.
    triggers: ["small n", "anecdote", "early results"]
    failure_guarded: "generalizing from too few observations"

  - id: quant.selection_bias
    principle: "Selection / survivorship bias"
    statement: >-
      Conclusions drawn from a non-representative sample (including only the
      'survivors') systematically mislead.
    triggers: ["self-selected data", "missing failures", "convenience sample"]
    failure_guarded: "ignoring the cases that never made it into the data"

  - id: quant.deterministic_chaos
    principle: "Deterministic chaos (sensitive dependence)"
    statement: >-
      A system can be fully deterministic yet practically unpredictable: tiny
      differences in initial conditions grow exponentially, so determinism does
      not imply predictability and unpredictability does not imply randomness.
    triggers: ["long-range prediction", "weather/climate forecast", "'it's deterministic so we can predict it'", "feedback loops"]
    failure_guarded: "conflating determinism with predictability, or treating chaotic divergence as proof of randomness or of a hidden cause"

  - id: quant.simpsons_paradox
    principle: "Simpson's paradox"
    statement: >-
      A trend that appears in aggregated data can reverse when the data are
      split into relevant subgroups; the right level of aggregation depends on
      the causal question.
    triggers: ["pooled groups", "overall rate cited", "comparing rates across populations"]
    failure_guarded: "drawing a conclusion from aggregate data without checking confounded subgroups"

  - id: quant.multiple_comparisons
    principle: "Multiple comparisons / look-elsewhere effect"
    statement: >-
      Testing many hypotheses inflates the chance of a false positive; a
      'significant' result found among many tests needs correction or
      out-of-sample confirmation.
    triggers: ["many variables tested", "subgroup hunting", "data dredging", "'we found a signal'"]
    failure_guarded: "reporting the one significant result out of many tests as if it stood alone"

  - id: quant.prosecutors_fallacy
    principle: "Prosecutor's fallacy (conditional swap)"
    statement: >-
      The probability of the evidence given the hypothesis is not the
      probability of the hypothesis given the evidence; P(E|H) != P(H|E).
    triggers: ["'the odds of this by chance are tiny'", "DNA/forensic match", "rare coincidence cited as proof"]
    failure_guarded: "treating a small P(evidence | innocent) as a small probability of innocence"

  - id: quant.dimensional_analysis
    principle: "Dimensional analysis"
    statement: >-
      Physical quantities have units that must balance across an equation; a
      result whose units do not match the quantity it claims to be is wrong.
    triggers: ["a formula or numeric claim", "unit-bearing quantity", "back-of-envelope estimate"]
    failure_guarded: "accepting a quantitative claim whose units are inconsistent or unstated"

  - id: quant.formal_limits
    principle: "Limits of formal certainty (Godel)"
    statement: >-
      Any sufficiently powerful consistent formal system contains true
      statements it cannot prove; no finite formal system captures all truths,
      so claims of complete, self-contained certainty deserve scrutiny.
    triggers: ["'provably complete'", "claim of absolute certainty", "self-validating system"]
    failure_guarded: "treating a formal system as able to certify its own completeness or total truth"

  - id: quant.central_limit_theorem
    principle: "Central limit theorem"
    statement: >-
      The sum or mean of many independent random variables tends toward a normal
      distribution regardless of the underlying distribution — which is why
      normal approximations are so widely valid, and why they fail when
      observations are dependent or heavy-tailed.
    triggers: ["averaging many measurements", "normal distribution assumed", "confidence intervals", "'the data are roughly bell-shaped'"]
    failure_guarded: "assuming normality when samples are dependent, few, or drawn from a heavy-tailed distribution"

  - id: quant.parsimony
    principle: "Parsimony (Occam's razor)"
    statement: >-
      Among hypotheses that explain the evidence equally well, prefer the one
      introducing the fewest unsupported assumptions — as a guide to investigate,
      not a proof of truth. Simplicity breaks ties; it does not settle them.
    triggers: ["competing explanations fit equally", "ad hoc assumptions added", "elaborate mechanism proposed", "'the simplest explanation'"]
    failure_guarded: "treating the simpler hypothesis as proven, or adding unfalsifiable epicycles to rescue a failing one"

  - id: quant.randomized_controls
    principle: "Randomization and control groups"
    statement: >-
      Strong causal claims from interventions require comparison against an
      appropriate control, and random assignment is the cleanest way to balance
      hidden confounders across groups.
    triggers: ["treatment claimed effective", "before/after comparison", "intervention study", "policy or drug claim"]
    failure_guarded: "inferring a causal treatment effect from uncontrolled or non-randomized comparisons that leave confounding unresolved"

  - id: quant.selection_vs_drift
    principle: "Selection must be distinguished from drift"
    statement: >-
      Changes in trait or allele frequency are not automatically evidence of
      adaptation; population size, sampling noise, linkage, migration, and
      generation time must be considered before attributing change to natural
      selection.
    triggers: ["adaptive story told", "rapid evolution claim", "allele frequency changed", "fitness advantage inferred"]
    failure_guarded: "telling an adaptation story without showing that the observed change exceeds what drift, migration, or linkage could plausibly produce"

  - id: quant.dose_response
    principle: "Dose-response and therapeutic window"
    statement: >-
      The magnitude and kind of a biological effect usually depend on dose,
      timing, route, and exposure history; absence of a response at one dose or
      toxicity at another does not by itself generalize across the whole range.
    triggers: ["drug or toxin claim", "supplement safety claim", "hormesis claim", "more is better / less is safer"]
    failure_guarded: "making binary safe-or-harmful claims without establishing the dose range, exposure route, and response curve"

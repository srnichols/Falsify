# Falsify knowledge seed — ESTABLISHED tier
# ----------------------------------------------------------------------------
# Well-supported scientific theories that are not (yet) called "law" but are
# largely undisputed within the scientific method: they make risky predictions,
# remain falsifiable, and have survived repeated honest tests.
# High weight — below Bedrock, above Contested.
#
# SOURCE OF TRUTH (version-controlled). Mirrored into OpenBrain by seed-sync.
# STARTER SET: expand via pull request.
# ----------------------------------------------------------------------------
tier: established
weight: 0.8
entries:
  - id: established.relativity.special
    statement: >-
      Special relativity: the laws of physics are the same in all inertial
      frames and the vacuum speed of light is invariant; space and time are
      observer-dependent.
    domain: physics/relativity
    type: theory
    falsifiable: true
    falsified_if: >-
      Reproducible faster-than-light signaling, or frame-dependent physics in
      inertial frames.
    status: well-supported
    confirmations: ["time dilation in particle lifetimes", "GPS clock corrections"]
    sources: ["Einstein 1905"]

  - id: established.relativity.general
    statement: >-
      General relativity: gravity is the curvature of spacetime by mass-energy.
    domain: physics/relativity
    type: theory
    falsifiable: true
    falsified_if: >-
      Confirmed deviations from its predictions (e.g. wrong light bending,
      no gravitational waves) without a relativistic explanation.
    status: well-supported
    confirmations:
      ["light bending (1919)", "gravitational waves (LIGO 2015)", "black-hole imaging"]
    sources: ["Einstein 1915"]

  - id: established.quantum.mechanics
    statement: >-
      Quantum mechanics: physical systems are described by wavefunctions whose
      squared amplitudes give probabilities of measurement outcomes.
    domain: physics/quantum
    type: theory
    falsifiable: true
    falsified_if: >-
      Reproducible violation of its statistical predictions (e.g. results
      inconsistent with the Born rule / Bell inequalities under valid tests).
    status: well-supported
    confirmations: ["Bell-test violations of local hidden variables", "semiconductor physics"]
    note: >-
      The mathematical framework is established and undisputed; its *interpretation*
      is genuinely contested — see contested.yaml (quantum interpretations).
    sources: ["Born, Heisenberg, Schrodinger, Dirac"]

  - id: established.geology.plate_tectonics
    statement: >-
      Earth's lithosphere is divided into plates that move over the
      asthenosphere, explaining earthquakes, volcanism, and mountain building.
    domain: geology
    type: theory
    falsifiable: true
    falsified_if: >-
      Continents shown not to move, or seafloor spreading / paleomagnetic
      striping absent.
    status: well-supported
    confirmations: ["seafloor spreading", "GPS-measured plate motion", "magnetic striping"]
    sources: ["Wegener (continental drift)", "1960s seafloor-spreading synthesis"]

  - id: established.biology.germ_theory
    statement: >-
      Many diseases are caused by microorganisms that infect a host.
    domain: biology/medicine
    type: theory
    falsifiable: true
    falsified_if: >-
      Infectious diseases shown to occur with no transmissible microbial agent
      and no other identifiable cause.
    status: well-supported
    confirmations: ["Koch's postulates", "antibiotics", "vaccination"]
    sources: ["Pasteur", "Koch"]

  - id: established.cosmology.big_bang
    statement: >-
      The observable universe expanded from a hot, dense early state ~13.8
      billion years ago.
    domain: cosmology
    type: theory
    falsifiable: true
    falsified_if: >-
      Absence of predicted relics (e.g. cosmic microwave background) or
      observations requiring no expansion.
    status: well-supported
    confirmations:
      ["cosmic microwave background", "Hubble expansion", "light-element abundances"]
    sources: ["Lemaitre", "Penzias & Wilson 1965"]

  - id: established.biology.evolution_natural_selection
    statement: >-
      Populations evolve over generations through differential reproduction of
      heritable variation; natural selection, together with mutation, drift, and
      gene flow, accounts for adaptation and common descent.
    domain: biology
    type: theory
    falsifiable: true
    falsified_if: >-
      Reproducible findings that break the nested hierarchy of life (e.g.
      well-dated fossils grossly out of sequence), or a demonstration that
      heritable variation cannot accumulate to produce new forms.
    status: well-supported
    confirmations:
      ["fossil succession", "observed speciation", "shared genetic code & ERVs", "antibiotic resistance"]
    note: >-
      This is the scientific theory, which is itself well-supported and
      falsifiable. The broader *origins* question as framed in public debate is
      handled separately under contested.yaml, by project rule.
    sources: ["Darwin 1859", "modern evolutionary synthesis"]

  - id: established.biology.cell_theory
    statement: >-
      All living organisms are composed of one or more cells, the cell is the
      basic unit of life, and all cells arise from pre-existing cells.
    domain: biology
    type: theory
    falsifiable: true
    falsified_if: >-
      Reproducible discovery of a living organism not made of cells, or of cells
      arising de novo from non-cellular matter under ordinary conditions.
    status: well-supported
    confirmations: ["microscopy across all known life", "cell division observed directly"]
    sources: ["Schleiden & Schwann 1839", "Virchow 1855"]

  - id: established.biology.central_dogma
    statement: >-
      Genetic information generally flows from DNA to RNA to protein; sequence
      information transferred into protein cannot flow back out of protein into
      nucleic acid or protein.
    domain: biology/molecular
    type: theory
    falsifiable: true
    falsified_if: >-
      Reproducible demonstration of sequence information flowing from protein
      back into nucleic acid (true reverse translation).
    status: well-supported
    confirmations: ["transcription & translation machinery", "genetic code is near-universal"]
    domain_of_validity: >-
      Reverse transcription (RNA -> DNA) is a known, bounded part of the dogma,
      not a violation of it; the barred step is protein -> sequence.
    sources: ["Crick 1958, 1970"]

  - id: established.chemistry.atomic_theory
    statement: >-
      Matter is composed of discrete atoms that combine in fixed whole-number
      ratios to form compounds.
    domain: chemistry
    type: theory
    falsifiable: true
    falsified_if: >-
      Reproducible evidence that matter is continuously divisible without limit,
      or that elements combine in continuously variable atomic ratios.
    status: well-supported
    confirmations: ["Brownian motion (Einstein/Perrin)", "direct atomic imaging", "the periodic table"]
    sources: ["Dalton 1808", "Perrin 1908"]

  - id: established.physics.universal_gravitation
    statement: >-
      Every mass attracts every other mass with a force proportional to the
      product of their masses and inversely proportional to the square of the
      distance between them.
    domain: physics/gravitation
    type: theory
    falsifiable: true
    falsified_if: >-
      Reproducible gravitational behavior inconsistent with the inverse-square
      law in its valid regime and not attributable to additional masses.
    status: well-supported
    confirmations: ["planetary orbits", "prediction of Neptune", "tides"]
    domain_of_validity: >-
      An excellent approximation at low mass and low speed. Superseded by general
      relativity near large masses and high velocities (Mercury's perihelion,
      light bending, GPS).
    sources: ["Newton 1687"]

  - id: established.physics.mass_energy_equivalence
    statement: >-
      Mass and energy are equivalent and interconvertible, related by E = mc^2.
    domain: physics/relativity
    type: theory
    falsifiable: true
    falsified_if: >-
      Reproducible mass-energy conversions that systematically violate
      E = mc^2 with no other explanation.
    status: well-supported
    confirmations:
      ["nuclear binding energy / fission & fusion yields", "particle-antiparticle annihilation", "mass defect measurements"]
    sources: ["Einstein 1905"]

  - id: established.physics.standard_model
    statement: >-
      Matter is built from quarks and leptons interacting via the
      electromagnetic, weak, and strong forces, mediated by gauge bosons, with
      mass arising through the Higgs mechanism.
    domain: physics/particle
    type: theory
    falsifiable: true
    falsified_if: >-
      Reproducible particles or interactions that cannot be accommodated by the
      model's gauge structure (clear, confirmed beyond-Standard-Model physics).
    status: well-supported
    confirmations:
      ["predicted W and Z bosons", "predicted Higgs boson (2012)", "precision electroweak tests"]
    domain_of_validity: >-
      Does not include gravity and does not explain dark matter or neutrino
      masses fully; it is known to be incomplete, not refuted, within its domain.
    sources: ["Glashow-Weinberg-Salam", "ATLAS & CMS 2012"]

  - id: established.physics.ohms_law
    statement: >-
      For many conductors the current through them is directly proportional to
      the voltage across them, with resistance as the constant of proportionality
      (V = IR).
    domain: physics/electromagnetism
    type: law
    falsifiable: true
    falsified_if: >-
      An ohmic material under stated conditions is shown to carry current not
      proportional to applied voltage with no change in its physical state.
    status: well-supported
    confirmations: ["circuit measurements across metals and resistors"]
    domain_of_validity: >-
      An empirical, material-specific approximation, not a fundamental law. It
      fails for non-ohmic devices (diodes, semiconductors, plasmas, filaments)
      and for ohmic materials at extreme fields or temperatures.
    sources: ["Ohm 1827"]

  - id: established.physics.hookes_law
    statement: >-
      The force needed to extend or compress an elastic body is proportional to
      the displacement (F = -kx).
    domain: physics/mechanics
    type: law
    falsifiable: true
    falsified_if: >-
      An elastic material within its elastic range is shown to deform
      non-proportionally to applied force with no change in conditions.
    status: well-supported
    confirmations: ["springs, beams, and elastic solids under small strain"]
    domain_of_validity: >-
      Holds only below the elastic limit; beyond it materials yield, deform
      plastically, and the linear relation breaks down. A first-order
      approximation, not a universal law.
    sources: ["Hooke 1678"]

  - id: established.astronomy.kepler_laws
    statement: >-
      Planets move in ellipses with the Sun at one focus; a planet sweeps equal
      areas in equal times; and the square of a planet's orbital period is
      proportional to the cube of its semi-major axis.
    domain: astronomy
    type: theory
    falsifiable: true
    falsified_if: >-
      Reproducible orbital observations inconsistent with elliptical orbits or
      the period-distance relation, not attributable to additional masses or
      relativistic correction.
    status: well-supported
    confirmations: ["planetary ephemerides", "exoplanet transit timing", "satellite orbits"]
    domain_of_validity: >-
      Exact for an idealized two-body system; perturbed by other masses and by
      general relativity (e.g. Mercury's perihelion precession). Derivable from
      Newtonian gravitation.
    sources: ["Kepler 1609, 1619"]

  - id: established.geology.uniformitarianism
    statement: >-
      The geological processes observed operating today (erosion, deposition,
      volcanism, plate motion) are the same processes that shaped Earth's past;
      the present is the key to the past.
    domain: geology
    type: theory
    falsifiable: true
    falsified_if: >-
      Evidence that past geological features required processes with no
      present-day analogue operating under different physical laws.
    status: well-supported
    confirmations: ["observed sedimentation and erosion rates", "radiometric dating consistency", "ongoing plate motion"]
    domain_of_validity: >-
      Process uniformity, not strict rate uniformity: catastrophic events
      (impacts, megafloods, large eruptions) are admitted as real and are
      themselves present-day processes operating at higher intensity.
    sources: ["Hutton 1788", "Lyell 1830"]

  - id: established.biology.mendelian_inheritance
    statement: >-
      Heritable traits are carried by discrete factors (genes) that segregate so
      each parent passes one of two copies to offspring (segregation), and genes
      for different traits are inherited independently (independent assortment).
    domain: biology/genetics
    type: theory
    falsifiable: true
    falsified_if: >-
      Reproducible inheritance ratios that cannot be reconciled with discrete
      segregating factors, with no linkage, epigenetic, or cytoplasmic
      explanation.
    status: well-supported
    confirmations: ["dihybrid cross ratios", "chromosome theory of inheritance", "molecular identification of genes"]
    domain_of_validity: >-
      Independent assortment holds for genes on different chromosomes or far
      apart; linked genes are a known, bounded exception that founded gene
      mapping. Polygenic, epigenetic, and cytoplasmic inheritance extend the
      picture without overturning segregation.
    sources: ["Mendel 1866", "rediscovery 1900 (de Vries, Correns, Tschermak)"]

  - id: established.biology.endosymbiosis
    statement: >-
      Mitochondria and chloroplasts originated as free-living bacteria that were
      engulfed by and became permanent symbionts within ancestral eukaryotic
      cells.
    domain: biology/cell
    type: theory
    falsifiable: true
    falsified_if: >-
      Demonstration that these organelles arose by invagination of the host cell
      membrane rather than from a bacterial ancestor — e.g. absence of their own
      circular DNA or no phylogenetic link to bacteria.
    status: well-supported
    confirmations: ["organelles have their own circular DNA and ribosomes", "double membranes", "bacterial phylogeny of organelle genes"]
    sources: ["Mereschkowski 1905", "Margulis 1967"]

  - id: established.cs.shannon_information
    statement: >-
      Information can be quantified in bits; a message source has a definable
      entropy that sets the minimum average code length (source coding), and a
      noisy channel has a maximum capacity below which error-free communication
      is possible and above which it is not (channel coding).
    domain: computer-science/information
    type: theory
    falsifiable: true
    falsified_if: >-
      A reproducible coding scheme that compresses a source below its entropy
      without loss, or that communicates error-free above a channel's Shannon
      capacity.
    status: well-supported
    confirmations: ["modern data compression approaching entropy", "error-correcting codes approaching capacity (LDPC, polar codes)"]
    sources: ["Shannon 1948"]

  - id: established.cs.computability_limits
    statement: >-
      No algorithm can decide, for every possible program and input, whether that
      program will eventually halt; the halting problem is undecidable.
    domain: computer-science/computability
    type: theorem
    falsifiable: true
    falsified_if: >-
      Exhibition of a single algorithm that correctly decides halting for every
      program-input pair (a constructive counterexample to Turing's diagonal
      argument).
    status: well-supported
    domain_of_validity: >-
      A proven theorem about idealized Turing-equivalent computation, not an
      empirical claim. Specific programs can of course be analyzed; what is
      impossible is a single general decider for all of them.
    sources: ["Turing 1936", "Church 1936"]

  - id: established.biology.hardy_weinberg
    statement: >-
      In a large randomly mating population with no selection, mutation,
      migration, or genetic drift, allele and genotype frequencies remain
      constant from generation to generation, with genotype frequencies given by
      p^2, 2pq, and q^2.
    domain: biology/population-genetics
    type: principle
    falsifiable: true
    falsified_if: >-
      A population satisfying the model assumptions is shown to change allele or
      genotype frequencies across generations without sampling error or any
      violating force acting on it.
    status: well-supported
    confirmations: ["population-genetics surveys", "use as the null model for detecting selection and non-random mating"]
    domain_of_validity: >-
      A null-model equilibrium, not a claim that real populations never evolve.
      Real populations depart from it when selection, drift, mutation,
      migration, assortative mating, or finite size matter — which is why the
      principle is diagnostically useful.
    sources: ["Hardy 1908", "Weinberg 1908"]

  - id: established.geology.radiometric_dating
    statement: >-
      The ages of rocks and minerals can be determined from the measured ratios
      of radioactive parent and daughter isotopes, because radioactive decay
      proceeds at stable, quantifiable rates characterized by half-lives.
    domain: geology/geochronology
    type: theory
    falsifiable: true
    falsified_if: >-
      Reproducible isotope systems with known closed histories yield inconsistent
      ages, or decay constants are shown to vary in ordinary geological
      conditions.
    status: well-supported
    confirmations: ["independent agreement across U-Pb, K-Ar, Rb-Sr and other isotope systems", "consistency with ice cores, tree rings, and stratigraphy"]
    domain_of_validity: >-
      Requires correct system choice and accounting for open-system behavior,
      metamorphism, contamination, and initial daughter products. Different
      isotope systems suit different materials and timescales.
    sources: ["Rutherford 1905", "Boltwood 1907", "modern isotope geochronology"]

  - id: established.chemistry.le_chatelier
    statement: >-
      When a chemical system at equilibrium is disturbed by a change in
      concentration, pressure, volume, or temperature, the system shifts in the
      direction that partially opposes the disturbance.
    domain: chemistry/equilibrium
    type: principle
    falsifiable: true
    falsified_if: >-
      A reproducible equilibrium system responds to a perturbation in a way that
      systematically amplifies rather than opposes the disturbance, with no
      kinetic or non-equilibrium explanation.
    status: well-supported
    confirmations: ["acid-base equilibria", "gas-phase reaction shifts under pressure", "industrial Haber-Bosch optimization"]
    domain_of_validity: >-
      Applies to systems near thermodynamic equilibrium. It predicts the
      direction of shift, not the rate, and can be misleading when invoked for
      systems far from equilibrium or with coupled kinetic constraints.
    sources: ["Le Chatelier 1884", "van't Hoff"]

  - id: established.cosmology.hubble_law
    statement: >-
      On large scales, the recessional velocity of a galaxy is proportional to
      its distance from us, indicating that space itself is expanding.
    domain: cosmology
    type: law
    falsifiable: true
    falsified_if: >-
      Reproducible large-scale distance-redshift measurements fail to show an
      approximately linear relation once local peculiar velocities are accounted
      for.
    status: well-supported
    confirmations: ["galaxy redshift surveys", "distance ladder measurements", "supernova cosmology"]
    domain_of_validity: >-
      A large-scale relation. Nearby galaxies can deviate strongly because of
      local motions; at high redshift the exact relation depends on the
      cosmological model rather than remaining purely linear.
    sources: ["Hubble 1929", "Lemaitre 1927"]

  - id: established.physics.bernoulli_principle
    statement: >-
      For steady, incompressible, non-viscous flow along a streamline, an
      increase in a fluid's speed is accompanied by a decrease in its pressure
      or gravitational potential energy, such that total mechanical energy per
      unit volume is conserved along the streamline.
    domain: physics/fluid-dynamics
    type: principle
    falsifiable: true
    falsified_if: >-
      A reproducible flow satisfying Bernoulli's assumptions shows mechanical
      energy along a streamline not balancing between pressure, speed, and
      height.
    status: well-supported
    confirmations: ["Venturi tubes", "pitot-static measurements", "ideal-flow approximations in hydraulics and aerodynamics"]
    domain_of_validity: >-
      Applies only to steady, incompressible, non-viscous flow along a
      streamline. Viscosity, turbulence, compressibility, pumps, and shocks add
      losses or energy inputs that require fuller fluid-dynamics treatment.
    sources: ["Bernoulli 1738", "Euler equations"]

  - id: established.astronomy.stellar_nucleosynthesis
    statement: >-
      The chemical elements heavier than primordial hydrogen, helium, and trace
      lithium were forged by nuclear reactions inside stars, in supernovae, and
      in neutron-star mergers.
    domain: astronomy/astrophysics
    type: theory
    falsifiable: true
    falsified_if: >-
      Reproducible abundance patterns of elements and isotopes are shown to be
      incompatible with stellar and explosive nucleosynthesis, or stars are
      shown unable to produce the observed fusion products.
    status: well-supported
    confirmations: ["stellar spectra", "solar neutrinos and fusion models", "supernova nucleosynthesis yields", "r-process signatures from neutron-star mergers"]
    domain_of_validity: >-
      Explains the origin of most elements beyond primordial nucleosynthesis.
      The exact astrophysical site of some isotopes remains an active research
      question without overturning the core picture.
    sources: ["Burbidge, Burbidge, Fowler & Hoyle 1957", "Bethe 1939", "GW170817 kilonova observations"]

  - id: established.chemistry.bronsted_lowry_acid_base
    statement: >-
      In Brønsted-Lowry acid-base chemistry, acids donate protons and bases
      accept them; acid-base reactions are proton-transfer equilibria whose
      direction and extent can be quantified.
    domain: chemistry/acid-base
    type: theory
    falsifiable: true
    falsified_if: >-
      Reproducible proton-transfer reactions are found that systematically
      violate acid-base equilibrium predictions with no alternative framework or
      solvent effect accounting for them.
    status: well-supported
    confirmations: ["titration curves", "buffer behavior", "equilibrium constants and pKa scales"]
    domain_of_validity: >-
      Covers proton-transfer chemistry. Lewis acid-base theory is broader,
      extending acid-base behavior beyond proton transfer rather than refuting
      Brønsted-Lowry within its domain.
    sources: ["Bronsted 1923", "Lowry 1923"]

  - id: established.chemistry.arrhenius_kinetics
    statement: >-
      Reaction rates generally increase with temperature because molecules more
      often exceed an activation-energy barrier; for many reactions the rate
      constant follows the Arrhenius relation k = A exp(-Ea/RT).
    domain: chemistry/kinetics
    type: theory
    falsifiable: true
    falsified_if: >-
      Reproducible rate measurements over a stated temperature range fail to
      show the predicted temperature dependence for reactions expected to obey
      Arrhenius behavior, with no mechanistic change explaining the deviation.
    status: well-supported
    confirmations: ["temperature-dependent rate measurements", "activation-energy extraction from Arrhenius plots", "collision and transition-state models"]
    domain_of_validity: >-
      A widely useful approximation over limited temperature ranges. Deviations
      occur for barrierless reactions, quantum tunneling, enzyme catalysis, or
      when the reaction mechanism changes.
    sources: ["Arrhenius 1889", "transition-state theory"]

  - id: established.physics.ideal_gas_law
    statement: >-
      For a dilute gas of non-interacting particles, pressure, volume,
      temperature, and amount are related by PV = nRT.
    domain: physics/thermodynamics
    type: law
    falsifiable: true
    falsified_if: >-
      A gas in the dilute, high-temperature limit is reproducibly shown to
      violate PV = nRT with no measurement or interaction-based explanation.
    status: well-supported
    confirmations: ["gas-law measurements across many gases in near-ideal regimes", "derivation from kinetic theory"]
    domain_of_validity: >-
      An approximation that becomes accurate for low-density gases far from
      condensation. Real gases deviate at high pressure, low temperature, or
      when intermolecular forces matter.
    sources: ["Boyle", "Charles", "Avogadro", "Clapeyron 1834", "kinetic theory"]

  - id: established.physics.wave_interference
    statement: >-
      Waves superpose linearly in their valid regime, producing constructive and
      destructive interference, diffraction, and standing-wave patterns that are
      predictable from phase relationships.
    domain: physics/optics
    type: principle
    falsifiable: true
    falsified_if: >-
      Reproducible wave experiments in the linear regime fail to exhibit the
      interference patterns predicted by superposition and phase difference.
    status: well-supported
    confirmations: ["double-slit interference", "thin-film interference", "diffraction gratings", "standing waves on strings and in cavities"]
    domain_of_validity: >-
      Applies in linear media and linear response regimes. Strong nonlinearities,
      decoherence, or dissipative effects can suppress or alter interference
      without falsifying the principle.
    sources: ["Young 1801", "Fresnel", "superposition principle"]

  - id: established.biology.genetic_linkage
    statement: >-
      Genes located on the same chromosome are inherited together more often
      than expected by independent assortment, while recombination during meiosis
      breaks linkage at rates that reflect chromosomal distance and enable gene
      mapping.
    domain: biology/genetics
    type: theory
    falsifiable: true
    falsified_if: >-
      Reproducible inheritance data for genes on the same chromosome show no
      excess co-inheritance and no distance-dependent recombination pattern.
    status: well-supported
    confirmations: ["Morgan's Drosophila crosses", "linkage maps", "meiotic recombination observed cytologically and molecularly"]
    domain_of_validity: >-
      Linkage strength depends on physical distance and local recombination
      landscape. Very distant loci on the same chromosome can appear nearly
      unlinked because multiple crossovers randomize inheritance.
    sources: ["Morgan 1910", "Sturtevant 1913"]

  - id: established.geology.deep_time
    statement: >-
      Earth's geological history spans billions of years, as shown by mutually
      consistent radiometric ages, stratigraphic order, plate motion, fossil
      succession, and astronomical constraints on solar-system formation.
    domain: geology/deep-time
    type: theory
    falsifiable: true
    falsified_if: >-
      Independent dating methods and stratigraphic records are reproducibly shown
      to collapse to a short timescale or to be systematically inconsistent with
      one another absent ad hoc rescue assumptions.
    status: well-supported
    confirmations: ["radiometric dating across multiple isotope systems", "annual layers in ice cores and lake varves", "plate-motion timescales", "meteorite and lunar ages"]
    domain_of_validity: >-
      Exact numeric ages continue to be refined, but the core conclusion that
      Earth history is immensely old does not depend on any single dating method.
    sources: ["Hutton", "Lyell", "modern geochronology", "meteorite dating"]

  - id: established.physics.neutrino_oscillation
    statement: >-
      Neutrinos change flavor as they propagate, implying that neutrino flavor
      states are mixtures of mass states and that neutrinos have nonzero mass.
    domain: physics/particle
    type: theory
    falsifiable: true
    falsified_if: >-
      Reproducible long-baseline, solar, atmospheric, or reactor experiments fail
      to show flavor-changing probabilities with distance and energy dependence
      consistent with oscillation.
    status: well-supported
    confirmations: ["solar neutrino deficit resolved by SNO", "atmospheric neutrino oscillations in Super-Kamiokande", "reactor and accelerator long-baseline experiments"]
    domain_of_validity: >-
      Establishes mass differences and flavor mixing, though the absolute mass
      scale and possible CP-violating phase remain active research questions.
    sources: ["Super-Kamiokande 1998", "SNO 2001-2002", "Pontecorvo", "Maki-Nakagawa-Sakata"]

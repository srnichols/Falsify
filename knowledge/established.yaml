# Falsify knowledge seed — ESTABLISHED tier
# ----------------------------------------------------------------------------
# Well-supported scientific theories that are not (yet) called "law" but are
# largely undisputed within the scientific method: they make risky predictions,
# remain falsifiable, and have survived repeated honest tests.
# High weight — below Bedrock, above Contested.
#
# SOURCE OF TRUTH (version-controlled). Mirrored into OpenBrain by seed-sync.
# STARTER SET: expand via pull request.
# ----------------------------------------------------------------------------
tier: established
weight: 0.8
entries:
  - id: established.relativity.special
    statement: >-
      Special relativity: the laws of physics are the same in all inertial
      frames and the vacuum speed of light is invariant; space and time are
      observer-dependent.
    domain: physics/relativity
    type: theory
    falsifiable: true
    falsified_if: >-
      Reproducible faster-than-light signaling, or frame-dependent physics in
      inertial frames.
    status: well-supported
    confirmations: ["time dilation in particle lifetimes", "GPS clock corrections"]
    sources: ["Einstein 1905"]

  - id: established.relativity.general
    statement: >-
      General relativity: gravity is the curvature of spacetime by mass-energy.
    domain: physics/relativity
    type: theory
    falsifiable: true
    falsified_if: >-
      Confirmed deviations from its predictions (e.g. wrong light bending,
      no gravitational waves) without a relativistic explanation.
    status: well-supported
    confirmations:
      ["light bending (1919)", "gravitational waves (LIGO 2015)", "black-hole imaging"]
    sources: ["Einstein 1915"]

  - id: established.quantum.mechanics
    statement: >-
      Quantum mechanics: physical systems are described by wavefunctions whose
      squared amplitudes give probabilities of measurement outcomes.
    domain: physics/quantum
    type: theory
    falsifiable: true
    falsified_if: >-
      Reproducible violation of its statistical predictions (e.g. results
      inconsistent with the Born rule / Bell inequalities under valid tests).
    status: well-supported
    confirmations: ["Bell-test violations of local hidden variables", "semiconductor physics"]
    note: >-
      The mathematical framework is established and undisputed; its *interpretation*
      is genuinely contested — see contested.yaml (quantum interpretations).
    sources: ["Born, Heisenberg, Schrodinger, Dirac"]

  - id: established.geology.plate_tectonics
    statement: >-
      Earth's lithosphere is divided into plates that move over the
      asthenosphere, explaining earthquakes, volcanism, and mountain building.
    domain: geology/tectonics
    type: theory
    falsifiable: true
    falsified_if: >-
      Continents shown not to move, or seafloor spreading / paleomagnetic
      striping absent.
    status: well-supported
    confirmations: ["seafloor spreading", "GPS-measured plate motion", "magnetic striping"]
    sources: ["Wegener (continental drift)", "1960s seafloor-spreading synthesis"]

  - id: established.biology.germ_theory
    statement: >-
      Many diseases are caused by microorganisms that infect a host.
    domain: biology/medicine
    type: theory
    falsifiable: true
    falsified_if: >-
      Infectious diseases shown to occur with no transmissible microbial agent
      and no other identifiable cause.
    status: well-supported
    confirmations: ["Koch's postulates", "antibiotics", "vaccination"]
    sources: ["Pasteur", "Koch"]

  - id: established.cosmology.big_bang
    statement: >-
      The observable universe expanded from a hot, dense early state ~13.8
      billion years ago.
    domain: astronomy/cosmology
    type: theory
    falsifiable: true
    falsified_if: >-
      Absence of predicted relics (e.g. cosmic microwave background) or
      observations requiring no expansion.
    status: well-supported
    confirmations:
      ["cosmic microwave background", "Hubble expansion", "light-element abundances"]
    sources: ["Lemaitre", "Penzias & Wilson 1965"]

  - id: established.biology.evolution_natural_selection
    statement: >-
      Populations evolve over generations through differential reproduction of
      heritable variation; natural selection, together with mutation, drift, and
      gene flow, accounts for adaptation and common descent.
    domain: biology/evolution
    type: theory
    falsifiable: true
    falsified_if: >-
      Reproducible findings that break the nested hierarchy of life (e.g.
      well-dated fossils grossly out of sequence), or a demonstration that
      heritable variation cannot accumulate to produce new forms.
    status: well-supported
    confirmations:
      ["fossil succession", "observed speciation", "shared genetic code & ERVs", "antibiotic resistance"]
    note: >-
      This is the scientific theory, which is itself well-supported and
      falsifiable. The broader *origins* question as framed in public debate is
      handled separately under contested.yaml, by project rule.
    sources: ["Darwin 1859", "modern evolutionary synthesis"]

  - id: established.biology.cell_theory
    statement: >-
      All living organisms are composed of one or more cells, the cell is the
      basic unit of life, and all cells arise from pre-existing cells.
    domain: biology/cell-biology
    type: theory
    falsifiable: true
    falsified_if: >-
      Reproducible discovery of a living organism not made of cells, or of cells
      arising de novo from non-cellular matter under ordinary conditions.
    status: well-supported
    confirmations: ["microscopy across all known life", "cell division observed directly"]
    sources: ["Schleiden & Schwann 1839", "Virchow 1855"]

  - id: established.biology.central_dogma
    statement: >-
      Genetic information generally flows from DNA to RNA to protein; sequence
      information transferred into protein cannot flow back out of protein into
      nucleic acid or protein.
    domain: biology/molecular
    type: theory
    falsifiable: true
    falsified_if: >-
      Reproducible demonstration of sequence information flowing from protein
      back into nucleic acid (true reverse translation).
    status: well-supported
    confirmations: ["transcription & translation machinery", "genetic code is near-universal"]
    domain_of_validity: >-
      Reverse transcription (RNA -> DNA) is a known, bounded part of the dogma,
      not a violation of it; the barred step is protein -> sequence.
    sources: ["Crick 1958, 1970"]

  - id: established.chemistry.atomic_theory
    statement: >-
      Matter is composed of discrete atoms that combine in fixed whole-number
      ratios to form compounds.
    domain: chemistry/atomic
    type: theory
    falsifiable: true
    falsified_if: >-
      Reproducible evidence that matter is continuously divisible without limit,
      or that elements combine in continuously variable atomic ratios.
    status: well-supported
    confirmations: ["Brownian motion (Einstein/Perrin)", "direct atomic imaging", "the periodic table"]
    sources: ["Dalton 1808", "Perrin 1908"]

  - id: established.physics.universal_gravitation
    statement: >-
      Every mass attracts every other mass with a force proportional to the
      product of their masses and inversely proportional to the square of the
      distance between them.
    domain: physics/gravitation
    type: theory
    falsifiable: true
    falsified_if: >-
      Reproducible gravitational behavior inconsistent with the inverse-square
      law in its valid regime and not attributable to additional masses.
    status: well-supported
    confirmations: ["planetary orbits", "prediction of Neptune", "tides"]
    domain_of_validity: >-
      An excellent approximation at low mass and low speed. Superseded by general
      relativity near large masses and high velocities (Mercury's perihelion,
      light bending, GPS).
    sources: ["Newton 1687"]

  - id: established.physics.mass_energy_equivalence
    statement: >-
      Mass and energy are equivalent and interconvertible, related by E = mc^2.
    domain: physics/relativity
    type: theory
    falsifiable: true
    falsified_if: >-
      Reproducible mass-energy conversions that systematically violate
      E = mc^2 with no other explanation.
    status: well-supported
    confirmations:
      ["nuclear binding energy / fission & fusion yields", "particle-antiparticle annihilation", "mass defect measurements"]
    sources: ["Einstein 1905"]

  - id: established.physics.standard_model
    statement: >-
      Matter is built from quarks and leptons interacting via the
      electromagnetic, weak, and strong forces, mediated by gauge bosons, with
      mass arising through the Higgs mechanism.
    domain: physics/particle
    type: theory
    falsifiable: true
    falsified_if: >-
      Reproducible particles or interactions that cannot be accommodated by the
      model's gauge structure (clear, confirmed beyond-Standard-Model physics).
    status: well-supported
    confirmations:
      ["predicted W and Z bosons", "predicted Higgs boson (2012)", "precision electroweak tests"]
    domain_of_validity: >-
      Does not include gravity and does not explain dark matter or neutrino
      masses fully; it is known to be incomplete, not refuted, within its domain.
    sources: ["Glashow-Weinberg-Salam", "ATLAS & CMS 2012"]

  - id: established.physics.ohms_law
    statement: >-
      For many conductors the current through them is directly proportional to
      the voltage across them, with resistance as the constant of proportionality
      (V = IR).
    domain: physics/electromagnetism
    type: law
    falsifiable: true
    falsified_if: >-
      An ohmic material under stated conditions is shown to carry current not
      proportional to applied voltage with no change in its physical state.
    status: well-supported
    confirmations: ["circuit measurements across metals and resistors"]
    domain_of_validity: >-
      An empirical, material-specific approximation, not a fundamental law. It
      fails for non-ohmic devices (diodes, semiconductors, plasmas, filaments)
      and for ohmic materials at extreme fields or temperatures.
    sources: ["Ohm 1827"]

  - id: established.physics.kirchhoffs_current_law
    statement: >-
      In a lumped electrical circuit, the algebraic sum of currents at a node
      is zero: total current flowing into a junction equals total current
      flowing out, reflecting conservation of charge.
    domain: physics/electromagnetism
    type: law
    falsifiable: true
    falsified_if: >-
      Reproducible circuit measurements at a node in the lumped-element regime
      show persistent current imbalance with no charge storage, parasitic path,
      or measurement artifact accounting for the discrepancy.
    status: well-supported
    confirmations: ["circuit-network measurements", "nodal analysis", "consistency with charge conservation in electronic systems"]
    domain_of_validity: >-
      Applies to lumped circuits where charge accumulation at the node is
      negligible on the timescale of interest. Distributed electromagnetic,
      high-frequency, or strongly time-varying systems require fuller field
      treatment without negating the circuit-law limit.
    sources: ["Kirchhoff 1845", "charge conservation", "circuit theory"]

  - id: established.physics.kirchhoffs_voltage_law
    statement: >-
      In a lumped electrical circuit, the algebraic sum of potential
      differences around any closed loop is zero: voltage rises and drops
      balance in accordance with energy conservation.
    domain: physics/electromagnetism
    type: law
    falsifiable: true
    falsified_if: >-
      Reproducible loop measurements in the lumped-element regime show net
      nonzero voltage around a closed path with no time-varying magnetic flux,
      parasitic coupling, or measurement artifact explaining the result.
    status: well-supported
    confirmations: ["loop analysis in circuits", "battery-resistor network measurements", "consistency with energy conservation in circuit models"]
    domain_of_validity: >-
      Applies to lumped circuits with negligible induced emf from changing
      magnetic flux through the loop. At high frequency or in distributed
      electromagnetic systems, Maxwell-Faraday effects require fuller field
      treatment.
    sources: ["Kirchhoff 1845", "energy conservation", "circuit theory"]

  - id: established.physics.electrical_power_relation
    statement: >-
      Electrical power delivered to or dissipated by a circuit element equals
      the product of voltage across it and current through it (P = IV); in
      ohmic resistive regimes this yields the equivalent forms P = I^2R and
      P = V^2/R.
    domain: physics/electromagnetism
    type: law
    falsifiable: true
    falsified_if: >-
      Reproducible measurements of voltage, current, and rate of energy
      transfer in stated circuit elements fail to satisfy the predicted power
      relation with no reactive storage, transient effect, or measurement error
      accounting for the discrepancy.
    status: well-supported
    confirmations: ["resistive load measurements", "joule-heating experiments", "power calculations in circuits and electrical engineering"]
    domain_of_validity: >-
      The general relation P = IV is local and broad, but the resistor-specific
      forms assume ohmic behavior. AC circuits, reactive components, and
      transients require distinguishing instantaneous, average, and apparent
      power.
    sources: ["Joule heating relation", "electrical circuit theory", "classical electromagnetism"]

  - id: established.physics.capacitance_charge_voltage_relation
    statement: >-
      For a capacitor in its linear regime, stored charge is proportional to
      voltage difference across its plates, Q = CV, and the stored energy
      follows the corresponding electrostatic relation.
    domain: physics/electromagnetism
    type: law
    falsifiable: true
    falsified_if: >-
      Reproducible capacitor measurements in the stated linear regime fail to
      show proportionality between stored charge and voltage, with no leakage,
      dielectric nonlinearity, geometry change, or measurement artifact
      explaining the discrepancy.
    status: well-supported
    confirmations: ["parallel-plate capacitor measurements", "circuit charge-storage experiments", "agreement with electrostatic field theory"]
    domain_of_validity: >-
      Applies to linear capacitive regimes with well-defined capacitance.
      Ferroelectric, strongly voltage-dependent, lossy, breakdown, or
      nanoscale regimes can require fuller dielectric models.
    sources: ["electrostatics", "capacitor theory", "classical circuit analysis"]

  - id: established.physics.inductor_self_induction_relation
    statement: >-
      A changing current in an inductor generates an emf that opposes that
      change, and in the linear regime the induced voltage is proportional to
      the rate of change of current, V = L dI/dt in sign convention form.
    domain: physics/electromagnetism
    type: law
    falsifiable: true
    falsified_if: >-
      Reproducible inductive elements in the stated linear regime fail to show
      the predicted opposition to changing current or the expected
      current-derivative voltage relation, with no parasitic capacitance,
      nonlinearity, or measurement artifact explaining the discrepancy.
    status: well-supported
    confirmations: ["coil transient measurements", "RL step-response experiments", "agreement with Faraday-Lenz induction"]
    domain_of_validity: >-
      Applies to inductors with approximately constant inductance in lumped
      circuit regimes. Saturation, core hysteresis, distributed effects,
      parasitic capacitance, and high-frequency radiation require fuller models.
    sources: ["Faraday 1831", "Lenz 1834", "classical circuit theory"]

  - id: established.physics.first_order_rc_transients
    statement: >-
      In a linear first-order RC circuit, charging and discharging toward a new
      steady state follow exponential time dependence set by the time constant
      tau = RC.
    domain: physics/electromagnetism
    type: theory
    falsifiable: true
    falsified_if: >-
      Reproducible step-response measurements of linear RC circuits fail to
      follow the predicted exponential approach or decay with the stated time
      constant, with no leakage, source impedance, parasitic element, or
      nonlinearity explaining the discrepancy.
    status: well-supported
    confirmations: ["capacitor charging curves", "oscilloscope step-response measurements", "first-order circuit analysis"]
    domain_of_validity: >-
      Applies to linear lumped RC circuits. Distributed lines, nonlinear
      dielectrics, strong leakage, and higher-order networks require fuller
      models with multiple time constants or non-exponential behavior.
    sources: ["classical circuit theory", "first-order differential-equation models", "laboratory RC transient experiments"]

  - id: established.physics.first_order_rl_transients
    statement: >-
      In a linear first-order RL circuit, current growth and decay after a step
      change follow exponential time dependence set by the time constant
      tau = L/R.
    domain: physics/electromagnetism
    type: theory
    falsifiable: true
    falsified_if: >-
      Reproducible step-response measurements of linear RL circuits fail to
      follow the predicted exponential current evolution with the stated time
      constant, with no saturation, parasitic element, source impedance, or
      measurement artifact explaining the discrepancy.
    status: well-supported
    confirmations: ["inductor current step-response measurements", "coil energizing and decay experiments", "first-order circuit analysis"]
    domain_of_validity: >-
      Applies to linear lumped RL circuits. Core saturation, parasitic
      capacitance, distributed effects, and higher-order networks require more
      detailed models.
    sources: ["classical circuit theory", "lumped-element transient analysis", "laboratory RL experiments"]

  - id: established.physics.ac_reactance_impedance
    statement: >-
      In sinusoidal steady-state AC circuits, capacitors and inductors oppose
      current with frequency-dependent reactance, and the combined opposition of
      resistance and reactance is captured by impedance, determining amplitude
      and phase relations between voltage and current.
    domain: physics/electromagnetism
    type: theory
    falsifiable: true
    falsified_if: >-
      Reproducible sinusoidal steady-state measurements of linear circuit
      elements fail to show the predicted frequency-dependent magnitude and
      phase behavior, with no parasitic effects, nonlinearity, or measurement
      artifact explaining the discrepancy.
    status: well-supported
    confirmations: ["frequency-response measurements", "phasor analysis", "AC circuit experiments with resistors, capacitors, and inductors"]
    domain_of_validity: >-
      Applies to linear lumped circuits in sinusoidal steady state. Nonlinear,
      strongly time-varying, distributed, switching, or high-radiation regimes
      require fuller time-domain or field-theoretic treatment.
    sources: ["phasor circuit theory", "Heaviside operational methods", "classical AC analysis"]

  - id: established.physics.resonance_in_lc_rlc_circuits
    statement: >-
      Circuits containing inductive and capacitive energy storage can exhibit
      resonance: near a characteristic frequency, energy oscillates between
      electric and magnetic storage, producing a pronounced frequency response
      whose shape depends on damping and coupling.
    domain: physics/electromagnetism
    type: theory
    falsifiable: true
    falsified_if: >-
      Reproducible LC or RLC circuits with known component values fail to show
      the predicted resonant-frequency behavior and damping dependence, with no
      parasitic element, nonlinearity, or measurement artifact explaining the
      discrepancy.
    status: well-supported
    confirmations: ["RLC frequency-response curves", "radio tuning circuits", "quality-factor measurements"]
    domain_of_validity: >-
      Applies to linear resonant circuits with identifiable lumped elements.
      Strong nonlinearities, distributed transmission-line effects, radiation,
      or component tolerances can shift or broaden resonance without negating
      the principle.
    sources: ["Thomson resonance relation", "classical circuit theory", "radio-frequency engineering"]

  - id: established.physics.hookes_law
    statement: >-
      The force needed to extend or compress an elastic body is proportional to
      the displacement (F = -kx).
    domain: physics/mechanics
    type: law
    falsifiable: true
    falsified_if: >-
      An elastic material within its elastic range is shown to deform
      non-proportionally to applied force with no change in conditions.
    status: well-supported
    confirmations: ["springs, beams, and elastic solids under small strain"]
    domain_of_validity: >-
      Holds only below the elastic limit; beyond it materials yield, deform
      plastically, and the linear relation breaks down. A first-order
      approximation, not a universal law.
    sources: ["Hooke 1678"]

  - id: established.physics.law_of_the_lever
    statement: >-
      A rigid lever in static equilibrium balances when the torques about its
      pivot are equal and opposite; in the ideal case the applied forces and
      their moment arms satisfy F1 d1 = F2 d2.
    domain: physics/mechanics
    type: law
    falsifiable: true
    falsified_if: >-
      Reproducible lever systems in static equilibrium are shown to violate
      torque balance under stated geometry and loading, with no hidden support,
      friction, deformation, or dynamic effect explaining the discrepancy.
    status: well-supported
    confirmations: ["beam-balance measurements", "static-equilibrium problems", "laboratory torque experiments"]
    domain_of_validity: >-
      Applies to rigid-body statics and quasi-static conditions. Real levers can
      deviate because of pivot friction, distributed mass, elastic deformation,
      and dynamic loading.
    sources: ["Archimedes on equilibrium of planes", "classical statics"]

  - id: established.engineering.ideal_pulley_mechanical_advantage
    statement: >-
      In an ideal pulley or block-and-tackle system, the mechanical advantage
      equals the number of rope segments supporting the load: reducing input
      force requires pulling a proportionally greater distance, so work is
      conserved apart from losses.
    domain: engineering/statics
    type: theory
    falsifiable: true
    falsified_if: >-
      Reproducible idealized pulley setups are shown to violate the predicted
      force-distance tradeoff or supporting-segment mechanical advantage, with
      no friction, rope stretch, or inertial effect accounting for the result.
    status: well-supported
    confirmations: ["block-and-tackle demonstrations", "work-energy calculations", "engineering statics experiments"]
    domain_of_validity: >-
      An idealization assuming massless rope, negligible pulley friction, and
      quasi-static motion. Real systems lose efficiency through friction,
      bending resistance, rope elasticity, and moving-mass effects.
    sources: ["classical statics", "work-energy principle", "engineering mechanics texts"]

  - id: established.engineering.gear_ratio_torque_speed_tradeoff
    statement: >-
      Meshed gears transmit motion with an angular-speed ratio set by their
      tooth counts or pitch radii; in the ideal case torque changes inversely
      with speed ratio, so increasing torque requires a proportional reduction
      in angular speed and vice versa.
    domain: engineering/machines
    type: theory
    falsifiable: true
    falsified_if: >-
      Reproducible gear trains with known geometry are shown to violate the
      predicted speed ratio or ideal torque-speed tradeoff, with no slip,
      backlash, compliance, or loss mechanism explaining the discrepancy.
    status: well-supported
    confirmations: ["gear-train kinematics", "machine-design calculations", "measured torque-speed ratios in transmissions"]
    domain_of_validity: >-
      Holds for correctly meshed gears in standard operating regimes. Real gear
      trains depart from the ideal because of friction, tooth deformation,
      backlash, manufacturing error, lubrication state, and transient loading.
    sources: ["classical machine design", "gear kinematics", "engineering mechanics texts"]

  - id: established.engineering.ideal_machine_work_conservation
    statement: >-
      Ideal simple machines conserve work: any gain in output force is paid for
      by a proportional increase in input distance, so input work equals output
      work apart from losses.
    domain: engineering/mechanics
    type: theory
    falsifiable: true
    falsified_if: >-
      Reproducible idealized machine setups are shown to deliver more output
      work than input work with no external energy source, and with no
      measurement error, stored-energy release, or loss accounting explaining
      the discrepancy.
    status: well-supported
    confirmations: ["lever and pulley work measurements", "inclined-plane demonstrations", "virtual-work derivations in statics"]
    domain_of_validity: >-
      An idealization assuming negligible friction, deformation, slip, and
      dissipative losses. Real machines always depart from equality because of
      inefficiency, compliance, and transient energy storage.
    sources: ["work-energy principle", "virtual work in statics", "classical mechanics and engineering texts"]

  - id: established.engineering.ideal_inclined_plane_mechanical_advantage
    statement: >-
      An ideal inclined plane reduces the input force needed to raise a load by
      trading force for distance; in the frictionless case the mechanical
      advantage is set by the ratio of ramp length to height, consistent with
      work conservation.
    domain: engineering/statics
    type: theory
    falsifiable: true
    falsified_if: >-
      Reproducible frictionless or corrected inclined-plane experiments fail to
      show the predicted force-distance tradeoff and geometric mechanical
      advantage, with no unaccounted friction, rolling effect, or measurement
      error explaining the discrepancy.
    status: well-supported
    confirmations: ["inclined-plane demonstrations", "work-energy calculations", "engineering statics problems and experiments"]
    domain_of_validity: >-
      An idealization assuming negligible friction and quasi-static motion.
      Real ramps depart from the ideal because of friction, rolling resistance,
      compliance, and dynamic effects.
    sources: ["classical mechanics", "engineering statics", "simple machine analysis"]

  - id: established.engineering.screw_force_distance_tradeoff
    statement: >-
      A screw converts rotational input into linear force and motion; in the
      ideal case its mechanical advantage is set by circumference-to-pitch
      geometry, so higher force is obtained at the cost of greater input
      turning distance.
    domain: engineering/machines
    type: theory
    falsifiable: true
    falsified_if: >-
      Reproducible screw-drive systems with known geometry fail to show the
      predicted rotation-to-translation and force-distance relation, with no
      thread friction, backlash, deformation, or measurement artifact
      explaining the discrepancy.
    status: well-supported
    confirmations: ["screw jack demonstrations", "lead-screw machine design", "power-screw force calculations"]
    domain_of_validity: >-
      An idealization assuming rigid geometry and negligible friction. Real
      screws can self-lock, lose efficiency, or deviate because of thread
      friction, wear, compliance, and dynamic loading.
    sources: ["classical machine design", "power screw analysis", "simple machine theory"]

  - id: established.engineering.wedge_force_distance_tradeoff
    statement: >-
      A wedge transforms force applied over a longer distance into a larger
      normal separating force over a shorter distance; in the ideal case its
      action follows geometric force-distance tradeoffs equivalent to an
      inclined plane in translational form.
    domain: engineering/statics
    type: theory
    falsifiable: true
    falsified_if: >-
      Reproducible wedge systems in the stated idealized regime fail to show
      the predicted geometric tradeoff between input displacement and output
      separating force, with no friction, deformation, or material failure
      explaining the discrepancy.
    status: well-supported
    confirmations: ["splitting and lifting wedge demonstrations", "statics derivations", "mechanical design calculations"]
    domain_of_validity: >-
      An idealization assuming rigid bodies and negligible friction. Real wedge
      behavior depends strongly on friction, edge geometry, compliance, and the
      fracture or yielding behavior of the material being separated.
    sources: ["classical statics", "simple machine analysis", "engineering mechanics texts"]

  - id: established.astronomy.kepler_laws
    statement: >-
      Planets move in ellipses with the Sun at one focus; a planet sweeps equal
      areas in equal times; and the square of a planet's orbital period is
      proportional to the cube of its semi-major axis.
    domain: astronomy/celestial-mechanics
    type: theory
    falsifiable: true
    falsified_if: >-
      Reproducible orbital observations inconsistent with elliptical orbits or
      the period-distance relation, not attributable to additional masses or
      relativistic correction.
    status: well-supported
    confirmations: ["planetary ephemerides", "exoplanet transit timing", "satellite orbits"]
    domain_of_validity: >-
      Exact for an idealized two-body system; perturbed by other masses and by
      general relativity (e.g. Mercury's perihelion precession). Derivable from
      Newtonian gravitation.
    sources: ["Kepler 1609, 1619"]

  - id: established.geology.uniformitarianism
    statement: >-
      The geological processes observed operating today (erosion, deposition,
      volcanism, plate motion) are the same processes that shaped Earth's past;
      the present is the key to the past.
    domain: geology/historical-geology
    type: theory
    falsifiable: true
    falsified_if: >-
      Evidence that past geological features required processes with no
      present-day analogue operating under different physical laws.
    status: well-supported
    confirmations: ["observed sedimentation and erosion rates", "radiometric dating consistency", "ongoing plate motion"]
    domain_of_validity: >-
      Process uniformity, not strict rate uniformity: catastrophic events
      (impacts, megafloods, large eruptions) are admitted as real and are
      themselves present-day processes operating at higher intensity.
    sources: ["Hutton 1788", "Lyell 1830"]

  - id: established.biology.mendelian_inheritance
    statement: >-
      Heritable traits are carried by discrete factors (genes) that segregate so
      each parent passes one of two copies to offspring (segregation), and genes
      for different traits are inherited independently (independent assortment).
    domain: biology/genetics
    type: theory
    falsifiable: true
    falsified_if: >-
      Reproducible inheritance ratios that cannot be reconciled with discrete
      segregating factors, with no linkage, epigenetic, or cytoplasmic
      explanation.
    status: well-supported
    confirmations: ["dihybrid cross ratios", "chromosome theory of inheritance", "molecular identification of genes"]
    domain_of_validity: >-
      Independent assortment holds for genes on different chromosomes or far
      apart; linked genes are a known, bounded exception that founded gene
      mapping. Polygenic, epigenetic, and cytoplasmic inheritance extend the
      picture without overturning segregation.
    sources: ["Mendel 1866", "rediscovery 1900 (de Vries, Correns, Tschermak)"]

  - id: established.biology.endosymbiosis
    statement: >-
      Mitochondria and chloroplasts originated as free-living bacteria that were
      engulfed by and became permanent symbionts within ancestral eukaryotic
      cells.
    domain: biology/cell
    type: theory
    falsifiable: true
    falsified_if: >-
      Demonstration that these organelles arose by invagination of the host cell
      membrane rather than from a bacterial ancestor — e.g. absence of their own
      circular DNA or no phylogenetic link to bacteria.
    status: well-supported
    confirmations: ["organelles have their own circular DNA and ribosomes", "double membranes", "bacterial phylogeny of organelle genes"]
    sources: ["Mereschkowski 1905", "Margulis 1967"]

  - id: established.cs.shannon_information
    statement: >-
      Information can be quantified in bits; a message source has a definable
      entropy that sets the minimum average code length (source coding), and a
      noisy channel has a maximum capacity below which error-free communication
      is possible and above which it is not (channel coding).
    domain: computer-science/information
    type: theory
    falsifiable: true
    falsified_if: >-
      A reproducible coding scheme that compresses a source below its entropy
      without loss, or that communicates error-free above a channel's Shannon
      capacity.
    status: well-supported
    confirmations: ["modern data compression approaching entropy", "error-correcting codes approaching capacity (LDPC, polar codes)"]
    sources: ["Shannon 1948"]

  - id: established.cs.computability_limits
    statement: >-
      No algorithm can decide, for every possible program and input, whether that
      program will eventually halt; the halting problem is undecidable.
    domain: computer-science/computability
    type: theorem
    falsifiable: true
    falsified_if: >-
      Exhibition of a single algorithm that correctly decides halting for every
      program-input pair (a constructive counterexample to Turing's diagonal
      argument).
    status: well-supported
    domain_of_validity: >-
      A proven theorem about idealized Turing-equivalent computation, not an
      empirical claim. Specific programs can of course be analyzed; what is
      impossible is a single general decider for all of them.
    sources: ["Turing 1936", "Church 1936"]

  - id: established.biology.hardy_weinberg
    statement: >-
      In a large randomly mating population with no selection, mutation,
      migration, or genetic drift, allele and genotype frequencies remain
      constant from generation to generation, with genotype frequencies given by
      p^2, 2pq, and q^2.
    domain: biology/population-genetics
    type: principle
    falsifiable: true
    falsified_if: >-
      A population satisfying the model assumptions is shown to change allele or
      genotype frequencies across generations without sampling error or any
      violating force acting on it.
    status: well-supported
    confirmations: ["population-genetics surveys", "use as the null model for detecting selection and non-random mating"]
    domain_of_validity: >-
      A null-model equilibrium, not a claim that real populations never evolve.
      Real populations depart from it when selection, drift, mutation,
      migration, assortative mating, or finite size matter — which is why the
      principle is diagnostically useful.
    sources: ["Hardy 1908", "Weinberg 1908"]

  - id: established.geology.radiometric_dating
    statement: >-
      The ages of rocks and minerals can be determined from the measured ratios
      of radioactive parent and daughter isotopes, because radioactive decay
      proceeds at stable, quantifiable rates characterized by half-lives.
    domain: geology/geochronology
    type: theory
    falsifiable: true
    falsified_if: >-
      Reproducible isotope systems with known closed histories yield inconsistent
      ages, or decay constants are shown to vary in ordinary geological
      conditions.
    status: well-supported
    confirmations: ["independent agreement across U-Pb, K-Ar, Rb-Sr and other isotope systems", "consistency with ice cores, tree rings, and stratigraphy"]
    domain_of_validity: >-
      Requires correct system choice and accounting for open-system behavior,
      metamorphism, contamination, and initial daughter products. Different
      isotope systems suit different materials and timescales.
    sources: ["Rutherford 1905", "Boltwood 1907", "modern isotope geochronology"]

  - id: established.chemistry.le_chatelier
    statement: >-
      When a chemical system at equilibrium is disturbed by a change in
      concentration, pressure, volume, or temperature, the system shifts in the
      direction that partially opposes the disturbance.
    domain: chemistry/equilibrium
    type: principle
    falsifiable: true
    falsified_if: >-
      A reproducible equilibrium system responds to a perturbation in a way that
      systematically amplifies rather than opposes the disturbance, with no
      kinetic or non-equilibrium explanation.
    status: well-supported
    confirmations: ["acid-base equilibria", "gas-phase reaction shifts under pressure", "industrial Haber-Bosch optimization"]
    domain_of_validity: >-
      Applies to systems near thermodynamic equilibrium. It predicts the
      direction of shift, not the rate, and can be misleading when invoked for
      systems far from equilibrium or with coupled kinetic constraints.
    sources: ["Le Chatelier 1884", "van't Hoff"]

  - id: established.cosmology.hubble_law
    statement: >-
      On large scales, the recessional velocity of a galaxy is proportional to
      its distance from us, indicating that space itself is expanding.
    domain: cosmology
    type: law
    falsifiable: true
    falsified_if: >-
      Reproducible large-scale distance-redshift measurements fail to show an
      approximately linear relation once local peculiar velocities are accounted
      for.
    status: well-supported
    confirmations: ["galaxy redshift surveys", "distance ladder measurements", "supernova cosmology"]
    domain_of_validity: >-
      A large-scale relation. Nearby galaxies can deviate strongly because of
      local motions; at high redshift the exact relation depends on the
      cosmological model rather than remaining purely linear.
    sources: ["Hubble 1929", "Lemaitre 1927"]

  - id: established.physics.bernoulli_principle
    statement: >-
      For steady, incompressible, non-viscous flow along a streamline, an
      increase in a fluid's speed is accompanied by a decrease in its pressure
      or gravitational potential energy, such that total mechanical energy per
      unit volume is conserved along the streamline.
    domain: physics/fluid-dynamics
    type: principle
    falsifiable: true
    falsified_if: >-
      A reproducible flow satisfying Bernoulli's assumptions shows mechanical
      energy along a streamline not balancing between pressure, speed, and
      height.
    status: well-supported
    confirmations: ["Venturi tubes", "pitot-static measurements", "ideal-flow approximations in hydraulics and aerodynamics"]
    domain_of_validity: >-
      Applies only to steady, incompressible, non-viscous flow along a
      streamline. Viscosity, turbulence, compressibility, pumps, and shocks add
      losses or energy inputs that require fuller fluid-dynamics treatment.
    sources: ["Bernoulli 1738", "Euler equations"]

  - id: established.physics.hydrostatic_pressure
    statement: >-
      In a static fluid under gravity, pressure increases with depth according
      to the fluid density and gravitational acceleration, so pressure
      differences reflect the weight of the overlying fluid column.
    domain: physics/fluid-statics
    type: law
    falsifiable: true
    falsified_if: >-
      Reproducible measurements in static fluids under stated gravitational
      conditions fail to show the predicted depth-dependent pressure relation,
      with no density stratification, acceleration, or measurement artifact
      explaining the discrepancy.
    status: well-supported
    confirmations: ["manometer measurements", "barometric and liquid-column experiments", "engineering hydrostatics"]
    domain_of_validity: >-
      Applies to fluids near static equilibrium in a gravitational field.
      Strong acceleration, significant compressibility, density gradients, or
      relativistic conditions require fuller treatment.
    sources: ["hydrostatics", "Pascal", "Euler fluid statics"]

  - id: established.physics.pascals_law
    statement: >-
      A pressure change applied to a confined fluid is transmitted throughout
      the fluid and to the container walls, enabling hydraulic force
      multiplication when acting over different areas.
    domain: physics/fluid-statics
    type: law
    falsifiable: true
    falsified_if: >-
      Reproducible confined-fluid systems fail to transmit imposed pressure
      changes as predicted in static conditions, with no leakage, compressible
      transient, or structural deformation explaining the discrepancy.
    status: well-supported
    confirmations: ["hydraulic press demonstrations", "manometer and piston experiments", "hydraulic brake and lift operation"]
    domain_of_validity: >-
      Applies to confined fluids in near-static conditions. Dynamic flow,
      compressibility, cavitation, leakage, and flexible walls can introduce
      deviations that require fuller fluid-mechanics treatment.
    sources: ["Pascal 1647-1648", "hydraulic systems", "fluid statics"]

  - id: established.physics.archimedes_buoyancy
    statement: >-
      An immersed body experiences an upward buoyant force equal to the weight
      of the fluid it displaces, determining floating, sinking, and apparent
      weight in fluids.
    domain: physics/fluid-statics
    type: law
    falsifiable: true
    falsified_if: >-
      Reproducible immersion experiments under stated conditions fail to match
      buoyant force to displaced-fluid weight, with no surface-tension,
      compressibility, or measurement artifact explaining the discrepancy.
    status: well-supported
    confirmations: ["displacement experiments", "floating-body tests", "density and apparent-weight measurements"]
    domain_of_validity: >-
      Applies in static or quasi-static fluid conditions. Surface tension,
      strong density gradients, rapid acceleration, and multiphase flows can
      require fuller analysis without overturning the buoyancy principle.
    sources: ["Archimedes", "hydrostatics", "classical fluid mechanics"]

  - id: established.physics.continuity_equation_fluids
    statement: >-
      Conservation of mass in fluid flow implies a continuity relation: for
      steady incompressible flow the volume flow rate remains constant along a
      stream tube, so narrowing a channel increases flow speed.
    domain: physics/fluid-dynamics
    type: law
    falsifiable: true
    falsified_if: >-
      Reproducible steady incompressible flows are shown to violate the
      predicted conservation of flow rate along a stream tube, with no leakage,
      accumulation, compressibility, or measurement artifact explaining the
      discrepancy.
    status: well-supported
    confirmations: ["pipe-flow measurements", "Venturi and nozzle experiments", "derivation from mass conservation"]
    domain_of_validity: >-
      Applies directly to steady incompressible flow and generalizes to the full
      differential mass-conservation equation for broader regimes.
      Compressible, unsteady, multiphase, or leaking systems require the fuller
      continuity form rather than the simplest constant-flow-rate statement.
    sources: ["mass conservation", "Eulerian fluid mechanics", "classical hydrodynamics"]

  - id: established.astronomy.stellar_nucleosynthesis
    statement: >-
      The chemical elements heavier than primordial hydrogen, helium, and trace
      lithium were forged by nuclear reactions inside stars, in supernovae, and
      in neutron-star mergers.
    domain: astronomy/astrophysics
    type: theory
    falsifiable: true
    falsified_if: >-
      Reproducible abundance patterns of elements and isotopes are shown to be
      incompatible with stellar and explosive nucleosynthesis, or stars are
      shown unable to produce the observed fusion products.
    status: well-supported
    confirmations: ["stellar spectra", "solar neutrinos and fusion models", "supernova nucleosynthesis yields", "r-process signatures from neutron-star mergers"]
    domain_of_validity: >-
      Explains the origin of most elements beyond primordial nucleosynthesis.
      The exact astrophysical site of some isotopes remains an active research
      question without overturning the core picture.
    sources: ["Burbidge, Burbidge, Fowler & Hoyle 1957", "Bethe 1939", "GW170817 kilonova observations"]

  - id: established.chemistry.bronsted_lowry_acid_base
    statement: >-
      In Brønsted-Lowry acid-base chemistry, acids donate protons and bases
      accept them; acid-base reactions are proton-transfer equilibria whose
      direction and extent can be quantified.
    domain: chemistry/acid-base
    type: theory
    falsifiable: true
    falsified_if: >-
      Reproducible proton-transfer reactions are found that systematically
      violate acid-base equilibrium predictions with no alternative framework or
      solvent effect accounting for them.
    status: well-supported
    confirmations: ["titration curves", "buffer behavior", "equilibrium constants and pKa scales"]
    domain_of_validity: >-
      Covers proton-transfer chemistry. Lewis acid-base theory is broader,
      extending acid-base behavior beyond proton transfer rather than refuting
      Brønsted-Lowry within its domain.
    sources: ["Bronsted 1923", "Lowry 1923"]

  - id: established.chemistry.arrhenius_kinetics
    statement: >-
      Reaction rates generally increase with temperature because molecules more
      often exceed an activation-energy barrier; for many reactions the rate
      constant follows the Arrhenius relation k = A exp(-Ea/RT).
    domain: chemistry/kinetics
    type: theory
    falsifiable: true
    falsified_if: >-
      Reproducible rate measurements over a stated temperature range fail to
      show the predicted temperature dependence for reactions expected to obey
      Arrhenius behavior, with no mechanistic change explaining the deviation.
    status: well-supported
    confirmations: ["temperature-dependent rate measurements", "activation-energy extraction from Arrhenius plots", "collision and transition-state models"]
    domain_of_validity: >-
      A widely useful approximation over limited temperature ranges. Deviations
      occur for barrierless reactions, quantum tunneling, enzyme catalysis, or
      when the reaction mechanism changes.
    sources: ["Arrhenius 1889", "transition-state theory"]

  - id: established.physics.ideal_gas_law
    statement: >-
      For a dilute gas of non-interacting particles, pressure, volume,
      temperature, and amount are related by PV = nRT.
    domain: physics/thermodynamics
    type: law
    falsifiable: true
    falsified_if: >-
      A gas in the dilute, high-temperature limit is reproducibly shown to
      violate PV = nRT with no measurement or interaction-based explanation.
    status: well-supported
    confirmations: ["gas-law measurements across many gases in near-ideal regimes", "derivation from kinetic theory"]
    domain_of_validity: >-
      An approximation that becomes accurate for low-density gases far from
      condensation. Real gases deviate at high pressure, low temperature, or
      when intermolecular forces matter.
    sources: ["Boyle", "Charles", "Avogadro", "Clapeyron 1834", "kinetic theory"]

  - id: established.physics.wave_interference
    statement: >-
      Waves superpose linearly in their valid regime, producing constructive and
      destructive interference, diffraction, and standing-wave patterns that are
      predictable from phase relationships.
    domain: physics/optics
    type: principle
    falsifiable: true
    falsified_if: >-
      Reproducible wave experiments in the linear regime fail to exhibit the
      interference patterns predicted by superposition and phase difference.
    status: well-supported
    confirmations: ["double-slit interference", "thin-film interference", "diffraction gratings", "standing waves on strings and in cavities"]
    domain_of_validity: >-
      Applies in linear media and linear response regimes. Strong nonlinearities,
      decoherence, or dissipative effects can suppress or alter interference
      without falsifying the principle.
    sources: ["Young 1801", "Fresnel", "superposition principle"]

  - id: established.physics.diffraction_limit
    statement: >-
      Finite apertures impose a diffraction limit on optical resolution: even
      perfect aberration-free imaging systems blur point sources into patterns
      whose size is set by wavelength and aperture geometry, limiting the
      smallest resolvable detail.
    domain: physics/optics
    type: theory
    falsifiable: true
    falsified_if: >-
      Reproducible imaging through finite apertures in the linear wave-optics
      regime systematically exceeds the predicted diffraction-limited resolving
      behavior with no near-field, computational, nonlinear, or measurement
      explanation.
    status: well-supported
    confirmations: ["Airy disk measurements", "microscope and telescope resolution tests", "agreement with Fourier optics"]
    domain_of_validity: >-
      Applies to linear far-field or paraxial imaging in conventional optics.
      Near-field methods, structured illumination, nonlinear microscopy, and
      computational super-resolution can surpass simple classical criteria by
      exploiting additional information or regimes.
    sources: ["Airy 1835", "Abbe 1873", "Fourier optics"]

  - id: established.physics.snells_law
    statement: >-
      When light crosses an interface between two isotropic media, the angles
      of incidence and refraction satisfy n1 sin(theta1) = n2 sin(theta2), so
      refraction is determined by the refractive indices of the media.
    domain: physics/optics
    type: law
    falsifiable: true
    falsified_if: >-
      Reproducible refraction measurements at smooth interfaces in the geometric
      optics regime systematically violate the predicted angle relation with no
      anisotropy, inhomogeneity, or wave-optics correction explaining the
      discrepancy.
    status: well-supported
    confirmations: ["air-glass and air-water refraction measurements", "geometric-optics experiments", "optical design calculations"]
    domain_of_validity: >-
      Applies to smooth interfaces in isotropic media within geometric optics.
      Anisotropic crystals, graded-index media, metamaterials, strong
      diffraction, and near-field wave effects require fuller treatment.
    sources: ["Snell", "Descartes", "geometric optics"]

  - id: established.physics.thin_lens_equation
    statement: >-
      For an ideal thin lens in the paraxial regime, object distance, image
      distance, and focal length satisfy 1/f = 1/do + 1/di, determining image
      formation and magnification in first-order optics.
    domain: physics/optics
    type: law
    falsifiable: true
    falsified_if: >-
      Reproducible imaging with thin lenses under paraxial conditions fails to
      satisfy the predicted focal relation with no thickness, aberration, or
      sign-convention error explaining the discrepancy.
    status: well-supported
    confirmations: ["bench-top lens imaging", "camera and microscope first-order optics", "ray-tracing in paraxial systems"]
    domain_of_validity: >-
      A paraxial thin-lens approximation. Thick lenses, wide-angle rays,
      strong aberrations, diffraction limits, and complex multi-element optics
      require fuller models.
    sources: ["Gaussian optics", "paraxial ray theory", "classical lens design"]

  - id: established.physics.prism_dispersion
    statement: >-
      Prisms separate white light into colors because refractive index depends
      on wavelength, so different wavelengths refract by different amounts and
      follow different paths through the optical medium.
    domain: physics/optics
    type: theory
    falsifiable: true
    falsified_if: >-
      Reproducible prism experiments with polychromatic light fail to show
      wavelength-dependent deviation in media known to be dispersive, with no
      alignment, absorption, or material-homogeneity issue explaining the
      result.
    status: well-supported
    confirmations: ["Newton prism experiments", "spectroscopy", "measured refractive-index dispersion curves"]
    domain_of_validity: >-
      Applies in transparent dispersive media over stated wavelength ranges.
      Absorbing bands, anisotropy, nonlinear optics, and engineered materials
      can require more detailed dispersion models.
    sources: ["Newton 1666", "dispersion theory", "spectroscopy"]

  - id: established.biology.genetic_linkage
    statement: >-
      Genes located on the same chromosome are inherited together more often
      than expected by independent assortment, while recombination during meiosis
      breaks linkage at rates that reflect chromosomal distance and enable gene
      mapping.
    domain: biology/genetics
    type: theory
    falsifiable: true
    falsified_if: >-
      Reproducible inheritance data for genes on the same chromosome show no
      excess co-inheritance and no distance-dependent recombination pattern.
    status: well-supported
    confirmations: ["Morgan's Drosophila crosses", "linkage maps", "meiotic recombination observed cytologically and molecularly"]
    domain_of_validity: >-
      Linkage strength depends on physical distance and local recombination
      landscape. Very distant loci on the same chromosome can appear nearly
      unlinked because multiple crossovers randomize inheritance.
    sources: ["Morgan 1910", "Sturtevant 1913"]

  - id: established.geology.deep_time
    statement: >-
      Earth's geological history spans billions of years, as shown by mutually
      consistent radiometric ages, stratigraphic order, plate motion, fossil
      succession, and astronomical constraints on solar-system formation.
    domain: geology/deep-time
    type: theory
    falsifiable: true
    falsified_if: >-
      Independent dating methods and stratigraphic records are reproducibly shown
      to collapse to a short timescale or to be systematically inconsistent with
      one another absent ad hoc rescue assumptions.
    status: well-supported
    confirmations: ["radiometric dating across multiple isotope systems", "annual layers in ice cores and lake varves", "plate-motion timescales", "meteorite and lunar ages"]
    domain_of_validity: >-
      Exact numeric ages continue to be refined, but the core conclusion that
      Earth history is immensely old does not depend on any single dating method.
    sources: ["Hutton", "Lyell", "modern geochronology", "meteorite dating"]

  - id: established.physics.neutrino_oscillation
    statement: >-
      Neutrinos change flavor as they propagate, implying that neutrino flavor
      states are mixtures of mass states and that neutrinos have nonzero mass.
    domain: physics/particle
    type: theory
    falsifiable: true
    falsified_if: >-
      Reproducible long-baseline, solar, atmospheric, or reactor experiments fail
      to show flavor-changing probabilities with distance and energy dependence
      consistent with oscillation.
    status: well-supported
    confirmations: ["solar neutrino deficit resolved by SNO", "atmospheric neutrino oscillations in Super-Kamiokande", "reactor and accelerator long-baseline experiments"]
    domain_of_validity: >-
      Establishes mass differences and flavor mixing, though the absolute mass
      scale and possible CP-violating phase remain active research questions.
    sources: ["Super-Kamiokande 1998", "SNO 2001-2002", "Pontecorvo", "Maki-Nakagawa-Sakata"]

  - id: established.materials.dislocations
    statement: >-
      Plastic deformation in crystalline materials is primarily mediated by the
      motion of dislocations, and material strength can be increased by blocking
      or impeding that motion through alloying, work hardening, precipitation,
      grain refinement, or other microstructural barriers.
    domain: materials-science
    type: theory
    falsifiable: true
    falsified_if: >-
      Reproducible deformation of crystalline solids is shown to occur without
      dislocation motion or other known defect mechanisms, or strengthening is
      found not to correlate with impeded defect motion in the stated regime.
    status: well-supported
    confirmations: ["electron microscopy of dislocations", "Hall-Petch strengthening", "work-hardening behavior", "slip systems in metals and crystals"]
    domain_of_validity: >-
      Most applicable to crystalline solids. Amorphous materials, polymers,
      ceramics, and high-temperature creep can involve different dominant
      mechanisms, though defects still matter broadly.
    sources: ["Taylor, Orowan, and Polanyi 1934", "materials dislocation theory"]

  - id: established.biology.fluid_mosaic_membrane
    statement: >-
      Biological membranes are dynamic lipid bilayers with embedded proteins;
      membrane structure is fluid rather than rigid, enabling selective
      permeability, signaling, transport, and compartmentalization.
    domain: biology/cell-biology
    type: theory
    falsifiable: true
    falsified_if: >-
      Reproducible evidence shows cell membranes are not bilayers, lack lateral
      fluidity, or cannot account for observed membrane-protein mobility and
      transport behavior.
    status: well-supported
    confirmations: ["freeze-fracture electron microscopy", "fluorescence recovery after photobleaching", "membrane-protein diffusion measurements"]
    domain_of_validity: >-
      A core organizing model, not a claim that all membranes are uniform.
      Membrane domains, cytoskeletal anchoring, and specialized lipid rafts add
      structure without overturning the bilayer-and-protein framework.
    sources: ["Singer and Nicolson 1972", "modern membrane biophysics"]

  - id: established.physics.ferromagnetism
    statement: >-
      In ferromagnetic materials, quantum exchange interactions align electron
      spins into domains, producing spontaneous magnetization below a critical
      temperature and hysteretic magnetic behavior under applied fields.
    domain: physics/magnetism
    type: theory
    falsifiable: true
    falsified_if: >-
      Reproducible measurements of ferromagnets fail to show domain behavior,
      spontaneous magnetization below the Curie temperature, or exchange-based
      alignment consistent with observed magnetization curves.
    status: well-supported
    confirmations: ["magnetic domain imaging", "Curie temperature transitions", "hysteresis loops", "neutron scattering and solid-state models"]
    domain_of_validity: >-
      Describes ferromagnets specifically. Paramagnetism, diamagnetism,
      antiferromagnetism, ferrimagnetism, and spin glasses are related but
      distinct magnetic regimes.
    sources: ["Weiss molecular-field theory", "Heisenberg exchange", "modern solid-state magnetism"]

  - id: established.meteorology.weather_systems
    statement: >-
      Large-scale weather arises from differential solar heating, pressure
      gradients, Earth's rotation, and the water cycle; air masses, fronts,
      cyclones, anticyclones, and latent heat release organize winds,
      precipitation, and storm development.
    domain: meteorology/weather
    type: theory
    falsifiable: true
    falsified_if: >-
      Reproducible atmospheric observations show that pressure fields,
      temperature gradients, moisture, and rotation do not govern the formation
      and motion of fronts, storms, and prevailing weather patterns.
    status: well-supported
    confirmations: ["synoptic weather maps", "radiosonde profiles", "satellite observations", "numerical weather prediction skill"]
    domain_of_validity: >-
      A physical framework for weather systems, not a claim of perfect
      predictability. Forecast skill is limited by chaos, model resolution,
      and uncertainty in initial conditions.
    sources: ["Bjerknes and the Bergen School", "modern dynamical meteorology"]

  - id: established.engineering.negative_feedback_control
    statement: >-
      Negative feedback can stabilize a system, reduce sensitivity to parameter
      variation, and improve disturbance rejection when loop gain, delay, and
      phase margins remain within stable bounds.
    domain: engineering/control-systems
    type: theory
    falsifiable: true
    falsified_if: >-
      Reproducible controlled systems designed within stated stability margins
      fail to exhibit the predicted reduction in error and sensitivity, with no
      unmodeled nonlinearities or delays explaining the result.
    status: well-supported
    confirmations: ["governors and servomechanisms", "Bode and Nyquist stability analysis", "ubiquity in electronics, aerospace, and physiology"]
    domain_of_validity: >-
      Feedback is not automatically stabilizing: excessive gain, lag, saturation,
      and nonlinearities can destabilize a loop. The principle is about
      correctly designed negative feedback in its modeled regime.
    sources: ["Maxwell 1868", "Nyquist 1932", "Bode 1945"]

  - id: established.materials.fracture_fatigue
    statement: >-
      Cracks concentrate stress, and repeated cyclic loading can nucleate and
      grow cracks until failure occurs at loads below a material's single-cycle
      strength; fracture and fatigue behavior follow reproducible relationships
      involving crack size, stress intensity, and loading history.
    domain: materials-science/fracture-mechanics
    type: theory
    falsifiable: true
    falsified_if: >-
      Reproducible crack-growth and failure data in stated regimes fail to track
      stress-intensity or fatigue-life relations with no alternative mechanism
      accounting for the discrepancy.
    status: well-supported
    confirmations: ["Griffith crack theory", "Paris-law crack-growth curves", "fatigue S-N data across engineering alloys"]
    domain_of_validity: >-
      Relations depend on material class, environment, loading mode, and crack
      geometry; plasticity, creep, corrosion, and very small cracks can require
      more detailed models.
    sources: ["Griffith 1921", "Irwin", "Paris and Erdogan 1963"]

  - id: established.physics.semiconductor_junctions
    statement: >-
      Semiconductor behavior is governed by band structure and mobile charge
      carriers; p-n junctions create depletion regions and built-in potentials
      that enable rectification, while transistor action controls current or
      voltage through carrier injection and field modulation.
    domain: physics/semiconductors
    type: theory
    falsifiable: true
    falsified_if: >-
      Reproducible semiconductor devices fail to show the predicted junction,
      carrier-transport, and transistor behaviors under stated doping and bias
      conditions, with no fabrication defect or contact effect explaining it.
    status: well-supported
    confirmations: ["diode I-V curves", "transistor switching and amplification", "band-gap measurements", "integrated-circuit operation"]
    domain_of_validity: >-
      The framework covers standard semiconductor regimes; extreme nanoscale,
      high-field, quantum-coherent, or strongly disordered devices can require
      more specialized transport models.
    sources: ["Shockley", "Bardeen and Brattain", "solid-state electronics"]

  - id: established.physics.fourier_heat_conduction
    statement: >-
      Heat flows from higher to lower temperature, and in many materials the
      conductive heat flux is proportional to the temperature gradient, as given
      by Fourier's law.
    domain: physics/heat-transfer
    type: law
    falsifiable: true
    falsified_if: >-
      Reproducible conductive heat flow in materials within the diffusive regime
      fails to scale with temperature gradient and thermal conductivity, with no
      nonlocal or radiative effect explaining the deviation.
    status: well-supported
    confirmations: ["steady-state heat-flow experiments", "engineering thermal design", "derivation and use in diffusion equations"]
    domain_of_validity: >-
      A continuum diffusive approximation. It can break down in ballistic,
      ultrafast, nanoscale, phase-changing, or strongly anisotropic regimes.
    sources: ["Fourier 1822", "classical heat-transfer theory"]

  - id: established.biology.homeostasis
    statement: >-
      Living organisms maintain key internal variables such as temperature, pH,
      osmolarity, glucose, and ion balance within bounded ranges through
      coordinated sensing, signaling, and feedback regulation.
    domain: biology/physiology
    type: principle
    falsifiable: true
    falsified_if: >-
      Reproducible physiological studies show stable organisms do not regulate
      internal variables against perturbation, or that the observed regulation
      occurs without coordinated feedback mechanisms.
    status: well-supported
    confirmations: ["thermoregulation", "glucose-insulin regulation", "acid-base balance", "osmoregulation"]
    domain_of_validity: >-
      Homeostasis is dynamic, not static; regulated set points can shift with
      circadian phase, development, stress, disease, and acclimatization.
    sources: ["Claude Bernard", "Walter Cannon"]

  - id: established.biology.immune_memory
    statement: >-
      Adaptive immune responses generate memory B and T cells and long-lived
      plasma cells that enable faster, stronger, and more specific responses on
      re-exposure to the same or a related pathogen or antigen.
    domain: biology/immunology
    type: theory
    falsifiable: true
    falsified_if: >-
      Reproducible immune studies show no enhanced secondary response after
      antigen exposure, or no durable cellular or humoral memory persists where
      the model predicts it should.
    status: well-supported
    confirmations: ["vaccination", "booster responses", "memory-cell tracing", "affinity maturation and clonal selection"]
    domain_of_validity: >-
      Memory quality varies by pathogen, antigen, tissue compartment, and host;
      waning immunity, immune escape, and immunosenescence modify durability
      without overturning the principle.
    sources: ["Burnet clonal selection", "modern cellular immunology"]

  - id: established.demography.demographic_transition
    statement: >-
      As societies industrialize and living conditions improve, mortality tends
      to fall before fertility does, producing temporary population growth,
      followed by declining fertility and slower long-run growth or stabilization.
    domain: social-science/demography
    type: theory
    falsifiable: true
    falsified_if: >-
      Large-scale demographic histories are reproducibly shown not to exhibit the
      predicted mortality-then-fertility transition pattern where the model's
      preconditions are met.
    status: well-supported
    confirmations: ["historical demographic transitions across Europe, East Asia, and Latin America", "links to urbanization, female education, and child survival"]
    domain_of_validity: >-
      A broad empirical pattern, not a rigid schedule. Timing and pathways vary
      with institutions, culture, migration, public health, and policy.
    sources: ["Notestein 1945", "historical demography"]

# Falsify knowledge seed — CONTESTED tier
# ----------------------------------------------------------------------------
# "Our best explanation at present" where more than one position is defensible.
# Medium weight, and the weight is SPLIT across positions — the engine never
# picks a winner here.
#
# RULES FOR THIS TIER (enforced by the engine):
#   1. Present EVERY position, each with its falsifiability status.
#   2. A position whose central claim admits no conceivable observation that
#      could falsify it is FLAGGED as "outside the scientific method" (Popper) —
#      regardless of which side it favors. This is applied symmetrically.
#   3. Consensus is recorded as a low-weight signal only; it never settles a
#      contested entry by itself (see DESIGN.md weighting).
#   4. The output is "here are the positions and what would decide between
#      them," never "the answer is X."
#
# SOURCE OF TRUTH (version-controlled). Mirrored into OpenBrain by seed-sync.
# STARTER SET: expand via pull request.
# ----------------------------------------------------------------------------
tier: contested
weight: 0.5
entries:
  - id: contested.origins.biodiversity
    question: "What best explains the present diversity and complexity of life?"
    domain: biology/origins
    positions:
      - label: "evolutionary biology"
        claim: >-
          Life diversified by common descent with modification, driven by
          mechanisms including natural selection, mutation, drift, and gene flow.
        falsifiable: true
        falsified_if: >-
          Reproducible findings that break the nested hierarchy (e.g. well-dated
          fossils grossly out of order, such as mammals in Precambrian strata),
          or demonstration that heritable variation cannot accumulate.
        falsifiability_status: scientific
        evidence_pointers:
          ["fossil succession", "shared genetic code & ERVs", "observed speciation", "biogeography"]
        note: >-
          As a scientific theory this position is itself well-supported and
          falsifiable; it is placed here because the *origins question* as the
          user frames it has more than one side in public debate.
      - label: "design / creation"
        claim: >-
          The diversity and complexity of life is best explained by an
          intelligent or supernatural cause.
        falsifiable: depends
        falsified_if: >-
          Depends entirely on formulation. A specific claim (e.g. "a structure
          could not arise by any stepwise natural pathway") can be tested and
          potentially falsified by demonstrating such a pathway. A claim framed
          so that no conceivable observation could count against it is, by rule
          2, outside the scientific method — not "false," but not a scientific
          hypothesis.
        falsifiability_status: conditional
        note: >-
          The engine must ask the user to state the claim in a testable form
          before scoring it. Untestable framings are reported as outside-method,
          symmetrically with any other tier.
    engine_directive: "present_all_positions_with_falsifiability; do_not_pick_winner"

  - id: contested.physics.quantum_interpretation
    question: "What does the quantum wavefunction physically represent?"
    domain: physics/quantum
    note: >-
      The mathematics and predictions are not in dispute (see established.yaml).
      Only the interpretation is contested — a clean example of legitimate,
      non-political scientific disagreement.
    positions:
      - label: "Copenhagen / collapse"
        claim: "The wavefunction represents knowledge and collapses on measurement."
        falsifiability_status: "currently interpretation-equivalent"
      - label: "Many-worlds"
        claim: "The wavefunction is real and never collapses; all outcomes occur in branches."
        falsifiability_status: "currently interpretation-equivalent"
      - label: "Pilot-wave (de Broglie-Bohm)"
        claim: "Particles have definite positions guided by a real wave."
        falsifiability_status: "currently interpretation-equivalent"
    engine_directive: >-
      Most interpretations make identical predictions today, so this is decided
      by evidence only where they diverge; otherwise present as open.

  - id: contested.cosmology.dark_matter_vs_mond
    question: "Why do galaxies rotate faster than visible mass predicts?"
    domain: astronomy/cosmology
    positions:
      - label: "particle dark matter"
        claim: "Unseen non-baryonic matter supplies the missing gravity."
        falsifiable: true
        falsified_if: "Direct detection persistently fails AND structure/lensing is fully explained without it."
        falsifiability_status: scientific
      - label: "modified gravity (MOND / relativistic variants)"
        claim: "Gravity departs from Newton/GR at very low accelerations."
        falsifiable: true
        falsified_if: "Systems (e.g. bullet-cluster lensing) require mass where no gravity-modification fits."
        falsifiability_status: scientific
    engine_directive: "both_falsifiable; present_evidence_for_each; do_not_pick_winner"

  - id: contested.biology.origin_of_life
    question: "How did the first self-replicating life arise from non-living chemistry?"
    domain: biology/origins
    note: >-
      Distinct from evolution (which explains change *after* life exists). The
      transition from chemistry to biology is genuinely open: each position is
      testable in principle, but none is yet decisive.
    positions:
      - label: "RNA world (genetics-first)"
        claim: >-
          Self-replicating RNA, which can both store information and catalyze
          reactions, preceded DNA and proteins.
        falsifiable: true
        falsified_if: >-
          Demonstration that RNA cannot sustain heritable self-replication under
          any plausible prebiotic conditions, or discovery that a different
          replicator must have come first.
        falsifiability_status: scientific
        evidence_pointers: ["ribozymes", "RNA in the ribosome's catalytic core", "lab-evolved self-copying RNA"]
      - label: "metabolism-first"
        claim: >-
          Self-sustaining chemical reaction networks (autocatalysis) arose first;
          heredity came later.
        falsifiable: true
        falsified_if: >-
          Demonstration that no plausible prebiotic reaction network is
          self-sustaining without a pre-existing template replicator.
        falsifiability_status: scientific
        evidence_pointers: ["autocatalytic cycles", "geochemical free-energy gradients"]
      - label: "hydrothermal / mineral-surface origin"
        claim: >-
          Life began at alkaline hydrothermal vents or on mineral surfaces that
          concentrated reactants and supplied proton gradients.
        falsifiable: true
        falsified_if: >-
          Demonstration that vent/mineral environments cannot drive the required
          chemistry, or strong evidence locating the origin elsewhere.
        falsifiability_status: scientific
        evidence_pointers: ["chemiosmotic gradients at vents", "mineral catalysis of prebiotic reactions"]
    engine_directive: "present_all_positions_with_falsifiability; do_not_pick_winner"

  - id: contested.mind.consciousness
    question: "What explains subjective conscious experience?"
    domain: neuroscience/philosophy
    note: >-
      A clean test of the falsifiability rule applied symmetrically: some
      positions make testable neural predictions; others (the 'hard problem')
      may be framed so that no observation could decide them, which the engine
      flags as outside the method — for any side.
    positions:
      - label: "physicalism / neural correlates"
        claim: >-
          Consciousness is produced by physical brain processes; specific neural
          mechanisms are necessary and sufficient for specific experiences.
        falsifiable: true
        falsified_if: >-
          Reproducible conscious experience with the proposed neural correlate
          absent, or the correlate present with experience reproducibly absent.
        falsifiability_status: scientific
        evidence_pointers: ["lesion studies", "anesthesia", "neural correlates of perception"]
      - label: "integrated information theory (IIT)"
        claim: >-
          Consciousness corresponds to the amount of integrated information (Phi)
          a system generates.
        falsifiable: conditional
        falsified_if: >-
          Depends on operationalization. Where Phi is computable and tied to
          report, mismatches between predicted and measured consciousness can
          test it; where Phi is not measurable, that formulation is untestable.
        falsifiability_status: conditional
      - label: "hard-problem dualism"
        claim: >-
          Subjective experience is non-physical and cannot be fully explained by
          any physical mechanism.
        falsifiable: depends
        falsified_if: >-
          Depends entirely on formulation. A version stating 'no physical account
          can ever predict experience' is, by rule 2, framed so that no
          observation could count against it — outside the scientific method,
          not 'false.' A version making a specific prediction can be tested.
        falsifiability_status: conditional
        note: >-
          The engine must ask for a testable formulation before scoring. The
          untestable framing is reported as outside-method, symmetrically.
    engine_directive: "present_all_positions_with_falsifiability; flag_untestable_framings; do_not_pick_winner"

  - id: contested.cs.p_vs_np
    question: "Can every problem whose solution is quickly verifiable also be quickly solved?"
    domain: computer-science/complexity
    note: >-
      A genuinely open mathematical question, not a political one — included as a
      clean example of an unresolved problem where the engine must report the
      open positions rather than assert an answer. Most experts expect P != NP,
      but expectation is not proof.
    positions:
      - label: "P != NP"
        claim: >-
          Some problems are fundamentally harder to solve than to verify; no
          polynomial-time algorithm exists for NP-complete problems.
        falsifiable: true
        falsified_if: >-
          Exhibition of a polynomial-time algorithm for any NP-complete problem,
          which would collapse the distinction and prove P = NP.
        falsifiability_status: scientific
        evidence_pointers: ["decades of failed attempts to find polynomial algorithms for NP-complete problems", "natural-proofs and relativization barriers"]
      - label: "P = NP"
        claim: >-
          Every efficiently verifiable problem is also efficiently solvable; a
          polynomial-time algorithm for NP-complete problems exists but has not
          yet been found.
        falsifiable: true
        falsified_if: >-
          A proof that no such algorithm can exist (a proven super-polynomial
          lower bound for an NP-complete problem).
        falsifiability_status: scientific
        evidence_pointers: ["no proof of separation exists yet", "some problems once believed hard have yielded to clever algorithms"]
    engine_directive: "present_all_positions_with_falsifiability; do_not_pick_winner"

  - id: contested.cosmology.hubble_tension
    question: "Why do local and early-universe measurements of the Hubble constant disagree?"
    domain: astronomy/cosmology
    note: >-
      A live scientific disagreement with clear empirical stakes: either one or
      more measurement pipelines hides an unresolved systematic, or the standard
      cosmological model is incomplete.
    positions:
      - label: "unrecognized systematics"
        claim: >-
          The tension is caused by calibration, selection, modeling, or analysis
          systematics in one or more measurement ladders rather than by new
          cosmological physics.
        falsifiable: true
        falsified_if: >-
          Independent methods with distinct systematics converge on the same
          discrepant values after known biases are removed.
        falsifiability_status: scientific
        evidence_pointers: ["Cepheid and supernova ladder recalibration", "CMB likelihood choices", "strong-lensing and standard-siren cross-checks"]
      - label: "new physics beyond standard LCDM"
        claim: >-
          The tension reflects real cosmology: additional early- or late-time
          physics alters the inferred expansion history beyond standard LCDM.
        falsifiable: true
        falsified_if: >-
          The discrepancy disappears under improved measurements without needing
          model extensions, or all viable extensions fail independent tests.
        falsifiability_status: scientific
        evidence_pointers: ["early dark energy proposals", "modified neutrino or relativistic-species content", "late-time expansion modifications"]
    engine_directive: "present_all_positions_with_falsifiability; do_not_pick_winner"

  - id: contested.materials.high_tc_superconductivity
    question: "What microscopic mechanism produces high-temperature superconductivity in unconventional superconductors?"
    domain: materials-science/condensed-matter
    note: >-
      Superconductivity itself is established; the unresolved issue is the
      pairing mechanism in cuprates and related unconventional materials.
    positions:
      - label: "spin-fluctuation-mediated pairing"
        claim: >-
          Electron pairing is primarily mediated by magnetic spin fluctuations
          rather than conventional phonon coupling.
        falsifiable: true
        falsified_if: >-
          Reproducible spectroscopy and phase-sensitive probes show pairing
          strength and symmetry inconsistent with a spin-fluctuation mechanism.
        falsifiability_status: scientific
        evidence_pointers: ["d-wave pairing symmetry", "magnetic resonance modes", "phase-sensitive Josephson experiments"]
      - label: "phonon or mixed-coupling mechanisms"
        claim: >-
          Lattice vibrations, or a mixed interaction with strong phonon
          involvement, play the dominant role in pairing.
        falsifiable: true
        falsified_if: >-
          Isotope effects, vibrational spectroscopy, and pairing scales are
          shown incompatible with any phonon-dominant or mixed-coupling account.
        falsifiability_status: scientific
        evidence_pointers: ["isotope-effect measurements", "ARPES and tunneling spectra", "electron-phonon coupling estimates"]
    engine_directive: "present_all_positions_with_falsifiability; do_not_pick_winner"

  - id: contested.medicine.alzheimers_pathogenesis
    question: "What is the primary driver of Alzheimer's disease pathogenesis?"
    domain: medicine/neuroscience
    note: >-
      The disease is established; the open issue is which mechanism sits highest
      in the causal chain and therefore best targets intervention.
    positions:
      - label: "amyloid-first"
        claim: >-
          Misprocessing and aggregation of amyloid-beta initiates the disease,
          with tau pathology, neuroinflammation, and synaptic loss downstream.
        falsifiable: true
        falsified_if: >-
          Reproducible intervention and longitudinal data show amyloid burden can
          be prevented or removed without altering disease initiation or course.
        falsifiability_status: scientific
        evidence_pointers: ["familial APP and presenilin mutations", "amyloid PET imaging", "anti-amyloid intervention studies"]
      - label: "tau / neuroinflammation / network-first"
        claim: >-
          Tau spread, inflammatory signaling, vascular injury, or network failure
          is primary, while amyloid is secondary or necessary but not dominant.
        falsifiable: true
        falsified_if: >-
          Reproducible data show tau, inflammation, and degeneration do not
          precede or independently predict decline once amyloid is controlled.
        falsifiability_status: scientific
        evidence_pointers: ["tau pathology tracks cognition more closely", "microglial-genetics signals", "vascular and metabolic risk correlations"]
    engine_directive: "present_all_positions_with_falsifiability; do_not_pick_winner"

  - id: contested.economics.minimum_wage_employment
    question: "What is the causal effect of minimum-wage increases on employment in low-wage labor markets?"
    domain: economics/labor
    note: >-
      A good empirical economics dispute: both sides are scientifically testable,
      and the disagreement turns on elasticities, labor-market structure, and
      identification strategy rather than on unfalsifiable ideology.
    positions:
      - label: "competitive-market reduction"
        claim: >-
          Raising the minimum wage above the market-clearing wage reduces demand
          for low-wage labor and therefore lowers employment or hours in the
          affected segment.
        falsifiable: true
        falsified_if: >-
          Well-identified policy changes repeatedly show no employment or hours
          decline in affected groups where the increase is large enough that the
          competitive model predicts one.
        falsifiability_status: scientific
        evidence_pointers: ["difference-in-differences studies", "teen and restaurant employment panels", "elasticity estimates in competitive models"]
      - label: "monopsony / small-or-zero effect"
        claim: >-
          In some labor markets employers have wage-setting power, so moderate
          minimum-wage increases can raise pay with little employment loss and
          in some cases improve job matching or retention.
        falsifiable: true
        falsified_if: >-
          Well-identified policy changes consistently show employment losses of
          the size predicted by competitive models across monopsony-like markets.
        falsifiability_status: scientific
        evidence_pointers: ["Card-Krueger style natural experiments", "search-friction and monopsony models", "heterogeneity across regions and sectors"]
    engine_directive: "present_all_positions_with_falsifiability; do_not_pick_winner"

  - id: contested.education.class_size_effects
    question: "How large and durable are the learning benefits of reducing class size?"
    domain: social-science/education
    note: >-
      The existence of some class-size effects is plausible, but the magnitude,
      persistence, and cost-effectiveness are actively debated and empirically
      testable.
    positions:
      - label: "substantial early-grade benefit"
        claim: >-
          Smaller classes, especially in early grades and disadvantaged settings,
          produce meaningful and lasting gains in learning and later outcomes.
        falsifiable: true
        falsified_if: >-
          Randomized and quasi-experimental studies repeatedly fail to detect
          durable gains in the targeted settings where the effect is predicted.
        falsifiability_status: scientific
        evidence_pointers: ["Project STAR", "long-term follow-up studies", "teacher attention and classroom-management mechanisms"]
      - label: "small or context-limited effect"
        claim: >-
          Average class-size reductions have small, inconsistent, or short-lived
          benefits relative to their cost, with teacher quality and curriculum
          often mattering more.
        falsifiable: true
        falsified_if: >-
          Randomized and quasi-experimental evidence consistently finds large,
          cost-effective gains across varied settings after implementation issues
          are accounted for.
        falsifiability_status: scientific
        evidence_pointers: ["meta-analyses with heterogeneous effects", "cost-effectiveness comparisons", "teacher-quality comparisons"]
    engine_directive: "present_all_positions_with_falsifiability; do_not_pick_winner"

# Falsify knowledge seed — REFUTED tier (the graveyard)
# ----------------------------------------------------------------------------
# Claims that were once seriously believed and that the scientific method has
# since FALSIFIED. This tier carries ZERO weight: a refuted claim can never
# support a hypothesis. Its purpose is the opposite of the other tiers —
# it is the engine's exhibit of what falsification actually looks like.
#
# Every entry records:
#   - `claim`         : what was once believed
#   - `falsified_by`  : the decisive observation/experiment that killed it
#   - `superseded_by` : what replaced it (optional)
#   - `lesson`        : the methodological takeaway (why this is here)
#
# This is the heart of "dissent over consensus": each of these was, in its day,
# the consensus. Consensus is not truth; the test is.
#
# SOURCE OF TRUTH (version-controlled). Mirrored into OpenBrain by seed-sync.
# STARTER SET: expand via pull request.
# ----------------------------------------------------------------------------
tier: refuted
weight: 0   # the graveyard supports nothing; it only instructs
entries:
  - id: refuted.physics.aether
    claim: >-
      Light propagates through a stationary "luminiferous aether" that fills all
      space and serves as the medium and absolute rest frame for electromagnetic
      waves.
    domain: physics/electromagnetism
    type: refuted-hypothesis
    era: "17th–19th century; dominant until ~1905"
    falsified_by: >-
      The Michelson–Morley experiment (1887) found no aether wind: the speed of
      light was the same in every direction regardless of Earth's motion. The
      predicted fringe shift never appeared.
    superseded_by: "Special relativity (no medium; invariant light speed)."
    lesson: >-
      A null result can be decisive. The absence of a predicted effect falsified
      a theory that had near-universal assent for two centuries.
    sources: ["Michelson-Morley 1887", "Einstein 1905"]

  - id: refuted.chemistry.phlogiston
    claim: >-
      Combustible bodies contain a fire-like element, "phlogiston," that is
      released when they burn; burning stops when the surrounding air is
      saturated with it.
    domain: chemistry
    type: refuted-theory
    era: "1667–late 18th century"
    falsified_by: >-
      Careful mass measurement: metals gain weight when they burn (calx is
      heavier than the metal). A substance being *released* cannot increase mass.
      Lavoisier showed combustion is combination with oxygen.
    superseded_by: "Oxygen theory of combustion (Lavoisier)."
    lesson: >-
      Quantitative bookkeeping (here, conservation of mass) overturns a
      qualitatively appealing story. Measure, don't narrate.
    sources: ["Lavoisier 1777", "Stahl (phlogiston)"]

  - id: refuted.physics.caloric
    claim: >-
      Heat is a conserved, weightless fluid ("caloric") that flows from hot to
      cold bodies.
    domain: physics/thermodynamics
    type: refuted-theory
    era: "18th–early 19th century"
    falsified_by: >-
      Rumford's cannon-boring observation that friction generates apparently
      unlimited heat — inconsistent with a conserved material fluid. Heat is a
      form of energy transfer, not a substance.
    superseded_by: "Mechanical theory of heat / thermodynamics."
    lesson: >-
      An inexhaustible source falsifies a conservation-of-substance claim. The
      mechanism, not the analogy, must fit the data.
    sources: ["Rumford 1798", "Joule", "first law of thermodynamics"]

  - id: refuted.biology.spontaneous_generation
    claim: >-
      Living organisms arise spontaneously from non-living matter (maggots from
      rotting meat, microbes from broth).
    domain: biology/origins
    type: refuted-hypothesis
    era: "antiquity–19th century"
    falsified_by: >-
      Pasteur's swan-neck flask experiments (1859): broth sterilized and kept
      free of airborne particles produced no life, while exposed broth did. The
      'spontaneous' life came from pre-existing organisms in the air.
    superseded_by: "Biogenesis ('all life from life'); later cell theory."
    lesson: >-
      Controlling the confound (airborne contamination) converted a vague belief
      into a sharp, falsifiable test — and it failed.
    sources: ["Pasteur 1859", "Redi 1668"]

  - id: refuted.astronomy.geocentrism
    claim: >-
      The Earth is the motionless center of the universe; the Sun, planets, and
      stars revolve around it.
    domain: astronomy/cosmology
    type: refuted-model
    era: "antiquity–17th century"
    falsified_by: >-
      Accumulating observations: Galileo's full set of Venus phases (requiring
      Venus to orbit the Sun), Jupiter's moons (centers of motion other than
      Earth), and the far simpler, more accurate Keplerian heliocentric model.
    superseded_by: "Heliocentrism (Copernicus/Kepler), then Newtonian gravitation."
    lesson: >-
      A model can be saved by epicycles for a long time; predictive simplicity
      and new instruments (the telescope) eventually decide. Consensus and
      antiquity are not evidence.
    sources: ["Galileo 1610", "Kepler", "Copernicus 1543"]

  - id: refuted.medicine.miasma
    claim: >-
      Epidemic diseases such as cholera are caused by "miasma" — bad air or
      noxious vapors from rotting matter.
    domain: biology/medicine
    type: refuted-theory
    era: "antiquity–19th century"
    falsified_by: >-
      John Snow's 1854 Broad Street investigation traced cholera to a single
      contaminated water pump, not to air. Removing the pump handle coincided
      with the outbreak's decline; germ theory later supplied the mechanism.
    superseded_by: "Germ theory of disease (see established.yaml)."
    lesson: >-
      Mapping the data spatially exposed the real cause. A competing, testable
      hypothesis beat an untestable 'bad air' that explained everything and
      predicted nothing.
    sources: ["Snow 1855", "Pasteur", "Koch"]

  - id: refuted.physics.vacuum_abhorrence
    claim: >-
      "Nature abhors a vacuum" — a true void cannot exist; nature acts to
      prevent any empty space from forming.
    domain: physics
    type: refuted-maxim
    era: "Aristotle–17th century"
    falsified_by: >-
      Torricelli's barometer (1643) produced a sustained vacuum above the
      mercury column, and Pascal's altitude experiments showed the column height
      varies with air pressure. The 'pull' was atmospheric pressure pushing, not
      an abhorrence of emptiness.
    superseded_by: "Atmospheric-pressure physics; the vacuum is ordinary and real."
    lesson: >-
      A teleological maxim ('nature wants…') is not a mechanism. Replacing intent
      with a measurable pushing force both explained the old cases and predicted
      new ones the maxim could not.
    sources: ["Torricelli 1643", "Pascal 1648"]

  - id: refuted.biology.lamarckism
    claim: >-
      Traits acquired through use or disuse during an organism's lifetime are
      directly inherited by its offspring (e.g. a giraffe stretching its neck
      passes a longer neck to its young).
    domain: biology/evolution
    type: refuted-theory
    era: "1809–early 20th century"
    falsified_by: >-
      Weismann's germ-plasm experiments and the chromosomal theory of
      inheritance: somatic changes do not alter the germ line. Cutting the tails
      of mice for generations never shortened their offspring's tails.
    superseded_by: "Mendelian genetics and the modern evolutionary synthesis."
    lesson: >-
      A mechanism that feels intuitive must still survive a direct test. Note the
      honest boundary: epigenetic inheritance transmits some gene-expression
      marks across generations, but this is a narrow, bounded channel — not the
      inheritance of acquired anatomical traits Lamarck proposed.
    sources: ["Lamarck 1809", "Weismann 1889", "Mendelian synthesis"]

  - id: refuted.cosmology.steady_state
    claim: >-
      The universe has no beginning and no end; it looks the same at all times,
      with matter continuously created to keep density constant as it expands
      (the perfect cosmological principle).
    domain: astronomy/cosmology
    type: refuted-theory
    era: "1948–1965"
    falsified_by: >-
      The 1965 discovery of the cosmic microwave background — a relic of a hot,
      dense early state the steady-state model forbids — together with the
      observed evolution of galaxy populations with look-back time (quasars were
      more common in the past).
    superseded_by: "Big Bang cosmology (see established.yaml)."
    lesson: >-
      A theory motivated by an appealing principle (an eternal, unchanging
      cosmos) still made a risky prediction — no relic radiation — and that
      prediction was decisively wrong. The losing side was held by leading
      cosmologists of the day.
    sources: ["Hoyle, Bondi & Gold 1948", "Penzias & Wilson 1965"]

  - id: refuted.engineering.perpetual_motion
    claim: >-
      A machine can be built that runs forever and/or delivers more work than the
      energy put into it, without an external energy source (perpetual motion of
      the first or second kind).
    domain: engineering/physics
    type: refuted-claim
    era: "Middle Ages–present (still recurring)"
    falsified_by: >-
      Every constructed device has failed, and the first and second laws of
      thermodynamics forbid both forms: energy cannot be created, and no cyclic
      process can convert heat entirely into work. Patent offices now reject such
      claims on sight.
    superseded_by: "The laws of thermodynamics (see bedrock.yaml)."
    lesson: >-
      A claim that contradicts a conservation law carries an extraordinary burden
      of proof. Centuries of confident, failed prototypes show that wanting a
      thing to work is not evidence that it can.
    sources: ["history of perpetual-motion patents", "first and second laws of thermodynamics"]

  - id: refuted.biology.vitalism
    claim: >-
      Living organisms possess a special non-physical "vital force" that is
      required to make organic compounds or to explain life's chemistry, beyond
      ordinary physical and chemical laws.
    domain: biology/cell-biology
    type: refuted-theory
    era: "18th–19th century"
    falsified_by: >-
      Wöhler's synthesis of urea from inorganic precursors (1828) and the later
      rise of biochemistry showed that compounds associated with life obey the
      same chemistry as non-living matter. No separate life-force was needed.
    superseded_by: "Biochemistry, cell theory, and molecular biology."
    lesson: >-
      A placeholder force that explains everything explains nothing. Once a
      phenomenon is reproduced under ordinary chemistry, the extra essence is
      doing no scientific work.
    sources: ["Wohler 1828", "rise of organic chemistry and biochemistry"]

  - id: refuted.physics.n_rays
    claim: >-
      A new form of radiation, "N-rays," emitted by many substances and even by
      the human nervous system, subtly brightens dim visual targets and reveals
      new physical effects.
    domain: physics
    type: refuted-claim
    era: "1903–1905"
    falsified_by: >-
      Controlled demonstrations showed the claimed effect vanished when observers
      were blinded to the apparatus state; Robert Wood secretly removed a prism
      from the setup and the experimenter still reported seeing the effect.
    superseded_by: "Observer-blinded experimental controls; no such radiation exists."
    lesson: >-
      Expectation can manufacture a signal. Weak, subjective effects demand
      blinding and controls before they count as evidence.
    sources: ["Blondlot 1903", "Robert W. Wood 1904"]

  - id: refuted.chemistry.polywater
    claim: >-
      Water can exist in a novel polymerized form, "polywater," with unusual
      density, boiling point, viscosity, and freezing behavior unlike ordinary
      H2O.
    domain: chemistry/materials-science
    type: refuted-claim
    era: "1960s–early 1970s"
    falsified_by: >-
      Improved analysis showed the anomalous samples were contaminated by salts,
      silica, and biological impurities from glass capillaries and handling.
      Pure water did not exhibit the claimed new phase.
    superseded_by: "Ordinary water chemistry plus contamination analysis."
    lesson: >-
      Exotic new phases should disappear, not strengthen, under tighter purity
      controls. Contamination is often the first rival hypothesis to kill.
    sources: ["Deryagin's polywater reports", "later contamination studies"]

  - id: refuted.physics.cold_fusion
    claim: >-
      Electrochemical cells using palladium and heavy water can produce
      sustained nuclear fusion at room temperature, with large excess heat and
      fusion products but without the expected high-energy signatures.
    domain: physics/chemistry
    type: refuted-claim
    era: "1989–present fringe persistence"
    falsified_by: >-
      Independent laboratories repeatedly failed to reproduce the claimed excess
      heat and nuclear products under controlled conditions, and the proposed
      reactions lacked the accompanying radiation required by established nuclear
      physics.
    superseded_by: "Conventional nuclear fusion physics and replication standards."
    lesson: >-
      Extraordinary claims need robust, independent replication before public
      announcement. A dramatic press conference is not evidence.
    sources: ["Fleischmann and Pons 1989", "DOE reviews", "failed replication studies"]

  - id: refuted.medicine.humoral_theory
    claim: >-
      Health and disease are governed by the balance of four bodily humors
      (blood, phlegm, yellow bile, black bile), so treatment should restore the
      proper mixture through purging, bleeding, and related interventions.
    domain: medicine/physiology
    type: refuted-theory
    era: "antiquity–19th century"
    falsified_by: >-
      The rise of anatomy, physiology, pathology, microbiology, and controlled
      clinical observation showed diseases have specific mechanisms rather than
      reflecting a generalized humor imbalance. Bloodletting and purging often
      harmed rather than healed.
    superseded_by: "Modern physiology, pathology, and germ theory."
    lesson: >-
      A theory that classifies everything but predicts little can survive for
      centuries. Mechanistic specificity and outcome data eventually kill it.
    sources: ["Galenic medicine", "19th-century pathological anatomy", "clinical outcome critiques of bloodletting"]

  - id: refuted.medicine.ulcer_stress_only
    claim: >-
      Peptic ulcers are caused only by stress, acid, and lifestyle factors, not
      by infectious agents.
    domain: medicine/gastroenterology
    type: refuted-theory
    era: "20th century mainstream view until 1980s"
    falsified_by: >-
      The discovery of Helicobacter pylori in ulcer patients, deliberate
      self-experimentation, biopsy evidence, and successful antibiotic treatment
      showed that many peptic ulcers are caused by bacterial infection.
    superseded_by: "H. pylori infectious etiology for many peptic ulcers."
    lesson: >-
      Dominant clinical stories can persist until a causal agent is isolated and
      intervention changes outcomes. Therapeutic success is often the decisive
      test.
    sources: ["Marshall and Warren 1983", "H. pylori eradication trials", "Nobel Prize 2005 context"]

  - id: refuted.medicine.radical_mastectomy_superiority
    claim: >-
      Ever more extensive surgical removal for breast cancer is necessarily
      superior, so radical mastectomy should outperform more conservative
      surgery in survival.
    domain: medicine/oncology
    type: refuted-treatment-dogma
    era: "late 19th century–late 20th century"
    falsified_by: >-
      Randomized clinical trials showed that less extensive surgery, often
      combined with radiation and systemic therapy, could match radical
      mastectomy in survival for many patients while reducing morbidity.
    superseded_by: "Stage- and biology-guided breast-conserving and multimodal treatment."
    lesson: >-
      'More aggressive' is not automatically more effective. Surgery, like any
      intervention, must answer to randomized outcome data.
    sources: ["Halsted doctrine", "NSABP trials", "modern breast oncology"]

  - id: refuted.medicine.vaccines_autism
    claim: >-
      Routine childhood vaccination, especially the MMR vaccine, causes autism
      spectrum disorder.
    domain: medicine/epidemiology
    type: refuted-claim
    era: "1998–present fringe persistence"
    falsified_by: >-
      Large cohort, case-control, and population studies across multiple
      countries found no increase in autism risk among vaccinated children, and
      the original paper promoting the claim was retracted for serious ethical
      and methodological failures.
    superseded_by: "The vaccine-autism causal claim is unsupported; autism prevalence changes are better explained by diagnostic expansion and ascertainment changes."
    lesson: >-
      A dramatic clinical claim can survive socially long after it has failed
      scientifically. Retraction, replication failure, and convergent population
      evidence all matter more than anecdote.
    sources: ["Wakefield et al. 1998 (retracted)", "large Scandinavian and UK cohort studies", "Institute of Medicine reviews"]

  - id: refuted.education.learning_styles
    claim: >-
      Students learn best when instruction is matched to their preferred
      learning style (such as visual, auditory, or kinesthetic), and style
      matching reliably improves educational outcomes.
    domain: social-science/education
    type: refuted-claim
    era: "late 20th century–present popular persistence"
    falsified_by: >-
      Controlled tests of the meshing hypothesis repeatedly failed to show the
      predicted crossover interaction in which students with different styles
      learn better from correspondingly matched instructional modes.
    superseded_by: "Evidence-based instruction based on content, retrieval, spacing, and cognitive load rather than style matching."
    lesson: >-
      Intuitive personalization stories are not enough; the specific prediction
      must appear in controlled comparisons. Here it repeatedly did not.
    sources: ["Pashler et al. 2008", "later reviews of the meshing hypothesis"]
